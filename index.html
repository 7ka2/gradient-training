<style>
  :root{
    --bg:#0D1128;
    --bg-grad-top:#131A3A;
    --panel:#181F44;
    --panel-2:#212A56;
    --line: rgba(255,255,255,0.08);
    --text:#F4F1E9;
    --text-dim:#9AA3D1;
    --text-faint:#6870A0;
    --easy:#6FB7E0;
    --hard:#F2994A;
    --grind:#E0574A;
    --rest:#4B5488;
    --success:#8FBF7F;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(120% 100% at 50% -10%, var(--bg-grad-top) 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:0.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  #app{max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative;}

  /* ---------- Header ---------- */
  header.top{position:fixed; top:0; left:0; right:0; max-width:480px; margin:0 auto; z-index:40; background:linear-gradient(180deg, var(--bg) 82%, transparent); box-sizing:border-box; height:calc(64px + env(safe-area-inset-top)); padding:env(safe-area-inset-top) calc(20px + env(safe-area-inset-right)) 0 calc(20px + env(safe-area-inset-left)); display:flex; align-items:center; justify-content:space-between;}
  .brand{display:flex; flex-direction:column; line-height:1;}
  .brand .name{font-size:26px; letter-spacing:0.04em; text-transform:uppercase;}
  .brand .sub{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.12em; margin-top:2px;}
  .gear{width:44px;height:44px;border-radius:12px;background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--text-dim);cursor:pointer;}
  .gear:active{background:var(--panel-2);}

  /* ---------- Elevation profile (signature element) ---------- */
  .profile-wrap{padding:calc(64px + env(safe-area-inset-top) + 10px) 20px 14px; cursor:pointer;}
  .profile-wrap svg{width:100%; display:block; overflow:visible;}
  .profile-caption{display:flex; justify-content:space-between; font-size:11px; color:var(--text-faint); margin-top:6px; text-transform:uppercase; letter-spacing:0.08em;}

  /* ---------- Main scroll area ---------- */
  main{flex:1; padding:0 20px 100px; overflow-y:auto;}
  .view{display:none;}
  .view.active{display:block; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  h2.section-title{font-size:13px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-faint); margin:22px 0 10px; font-weight:600;}
  h2.section-title:first-child{margin-top:6px;}

  /* Today card */
  .today-card{background:linear-gradient(155deg, var(--panel) 0%, var(--panel-2) 100%); border-radius:var(--radius); padding:22px; border:1px solid var(--line); position:relative; overflow:hidden;}
  .today-card .tag{display:inline-block; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; padding:4px 10px; border-radius:99px; background:rgba(255,255,255,0.08); color:var(--text-dim); margin-bottom:12px;}
  .today-card h1{font-size:34px; margin:0 0 6px; line-height:1.02;}
  .today-card .tagline{color:var(--text-dim); font-size:14.5px; line-height:1.4; margin:0 0 18px;}
  .stat-row{display:flex; gap:18px; margin-bottom:20px;}
  .stat{display:flex; flex-direction:column;}
  .stat b{font-size:20px; font-family:'JetBrains Mono',monospace;}
  .stat span{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px;}
  .btn{border:none; border-radius:14px; padding:15px 20px; font-size:15px; font-weight:600; cursor:pointer; width:100%; font-family:'Inter',sans-serif; transition:transform .1s;}
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--hard); color:#1A1206;}
  .btn-ghost{background:rgba(255,255,255,0.07); color:var(--text); border:1px solid var(--line);}
  .btn-done{background:var(--success); color:#0E1B0A;}
  .btn-outline-danger{background:transparent; border:1px solid rgba(224,87,74,0.4); color:var(--grind);}

  .segment-list{margin-top:18px; display:flex; flex-direction:column; gap:0;}
  .seg-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--line);}
  .seg-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .seg-label{font-size:13.5px; flex:1;}
  .seg-note{font-size:11.5px; color:var(--text-faint);}
  .seg-time{font-size:12px; color:var(--text-dim); font-family:'JetBrains Mono',monospace;}

  /* Week view */
  .day-card{display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px; cursor:pointer;}
  .day-card.today{border-color:rgba(242,153,74,0.55);}
  .day-card.done{opacity:0.65;}
  .day-num{display:flex; flex-direction:column; align-items:center; width:38px; flex-shrink:0;}
  .day-num .dow{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.06em;}
  .day-num .d{font-size:19px; font-family:'JetBrains Mono',monospace;}
  .day-info{flex:1; min-width:0;}
  .day-info .wname{font-size:15.5px; font-weight:600;}
  .day-info .wmeta{font-size:11.5px; color:var(--text-faint); margin-top:1px;}
  .day-status{width:22px; height:22px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .badge-dot{width:9px; height:9px; border-radius:2px;}
  .prog-icon{font-size:17px; flex-shrink:0;}
  .filter-chips{display:flex; gap:8px; margin-bottom:14px;}
  .cal-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .cal-nav{width:36px; height:36px; border-radius:10px; background:var(--panel); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text-dim); cursor:pointer;}
  .cal-month{font-size:17px; font-weight:600; font-family:'Barlow Condensed',sans-serif;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-weekday-row{margin-bottom:4px;}
  .cal-wd{text-align:center; font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em; padding-bottom:2px;}
  .cal-cell{aspect-ratio:1; border-radius:10px; background:var(--panel); border:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; gap:3px;}
  .cal-cell.empty{background:transparent; border-color:transparent; cursor:default;}
  .cal-cell.today{border-color:var(--hard);}
  .cal-cell.missed{border-color:rgba(224,87,74,0.35);}
  .cal-daynum{font-size:13px; font-family:'JetBrains Mono',monospace; color:var(--text);}
  .cal-dots{display:flex; gap:3px; height:6px;}
  .cal-dot{width:6px; height:6px; border-radius:50%;}
  .chip{padding:8px 14px; border-radius:99px; background:var(--panel); border:1px solid var(--line); font-size:12.5px; font-weight:600; color:var(--text-dim); cursor:pointer;}
  .chip.active{background:var(--hard); color:#1A1206; border-color:var(--hard);}

  /* Progress view */
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px;}
  .stat-box{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px;}
  .stat-box b{display:block; font-size:26px; font-family:'JetBrains Mono',monospace;}
  .stat-box span{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.07em;}
  .log-row{display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-top:1px solid var(--line); font-size:13.5px;}
  .log-feel{font-size:22px; flex-shrink:0;}
  .log-row .lname{font-weight:500;}
  .log-row .lmeta{color:var(--text-faint); font-size:11.5px;}

  /* Bottom nav */
  nav.bottom{position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center; background:linear-gradient(0deg, var(--bg) 60%, transparent); padding:14px 0 calc(14px + env(safe-area-inset-bottom)); pointer-events:none;}
  .nav-inner{pointer-events:auto; display:flex; gap:6px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:6px; width:calc(100% - 40px); max-width:440px;}
  .nav-btn{flex:1; text-align:center; padding:10px 0; border-radius:12px; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-faint); cursor:pointer; font-weight:600;}
  .nav-btn.active{background:var(--panel-2); color:var(--text);}

  /* Workout player */
  #player{position:fixed; inset:0; background:var(--bg); display:none; flex-direction:column; z-index:50;}
  #player.active{display:flex;}
  .player-top{display:flex; justify-content:space-between; align-items:center; padding:calc(20px + env(safe-area-inset-top)) calc(22px + env(safe-area-inset-right)) 14px calc(22px + env(safe-area-inset-left)); position:relative; z-index:2; background:var(--bg);}
  .player-close{color:var(--text-faint); font-size:14px; cursor:pointer; min-width:44px; min-height:44px; display:flex; align-items:center; padding:0 4px; margin-left:-4px;}
  .player-phase{font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-faint);}
  .player-mid{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; text-align:center; padding:14px 26px 10px; overflow-y:auto; -webkit-overflow-scrolling:touch;}

  /* target cluster: cadence gauge + effort ladder, grouped as one "what to aim for" panel */
  .gauge-panel{width:100%; max-width:290px; background:rgba(255,255,255,0.035); border:1px solid var(--line); border-radius:16px; padding:14px 16px 12px; margin-bottom:20px;}
  .pedal-row{display:flex; align-items:center; justify-content:center; gap:12px;}
  .pedal-svg{width:50px; height:50px; flex-shrink:0;}
  @keyframes spinPedal{from{transform:rotate(0deg);} to{transform:rotate(360deg);}}
  .pedal-rotor{transform-origin:50px 50px; animation-name:spinPedal; animation-timing-function:linear; animation-iteration-count:infinite;}
  .pedal-target{text-align:left;}
  .pedal-target .pl{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.08em;}
  .pedal-target b{display:block; font-size:19px; font-family:'JetBrains Mono',monospace; margin-top:1px;}
  .gauge-panel .ladder{margin-top:12px; padding-top:12px; border-top:1px solid var(--line);}
  .gauge-panel .ladder-phrase{margin-top:8px;}
  .ladder{display:flex; justify-content:center; align-items:flex-end; gap:7px;}
  .ladder-item{font-size:15px; opacity:0.28; filter:grayscale(1); transform:scale(0.85); transition:all .35s cubic-bezier(.34,1.4,.64,1); line-height:1;}
  .ladder-item.active{opacity:1; filter:none; transform:scale(1.45) translateY(-2px);}
  .ladder-item.passed{opacity:0.5; filter:grayscale(0.6); transform:scale(0.85);}
  .ladder-phrase{font-size:13.5px; font-weight:600; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.01em; transition:color .3s;}
  .ladder-phrase .lead{color:var(--text-faint); font-family:'Inter',sans-serif; font-weight:500; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:2px;}

  /* time cluster: the countdown and the thing visually depleting alongside it */
  @keyframes maxpulse{0%,100%{text-shadow:0 0 0 rgba(224,87,74,0);} 50%{text-shadow:0 0 22px rgba(224,87,74,0.55);}}
  .player-time.maxeffort{color:var(--grind); animation:maxpulse 1.1s ease-in-out infinite;}
  .food-wrap{width:100%; max-width:270px; margin-top:14px;}
  .food-track{width:100%; height:30px; border-radius:9px; background:var(--panel-2); border:1px solid var(--line); overflow:hidden; position:relative;}
  .food-fill{height:100%; display:flex; align-items:center; font-size:18px; white-space:nowrap; overflow:hidden; letter-spacing:1px; padding-left:5px; transition:width 1s linear; background:rgba(255,255,255,0.03);}
  .food-caption{font-size:11.5px; color:var(--text-dim); margin-top:7px; font-weight:500;}
  .food-burned{font-size:10px; color:var(--text-faint); margin-top:2px; text-transform:uppercase; letter-spacing:0.05em;}

  /* prominent up-next card */
  .next-card{width:100%; max-width:290px; margin-top:22px; border-radius:16px; padding:13px 16px; text-align:left; display:flex; align-items:center; gap:12px; border:1px solid var(--line); background:var(--panel);}
  .next-card .nc-bar{width:4px; align-self:stretch; border-radius:3px; flex-shrink:0;}
  .next-card .nc-icon{font-size:24px; flex-shrink:0;}
  .next-card .nc-body{flex:1; min-width:0;}
  .next-card .nc-eyebrow{font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-faint); font-weight:600;}
  .next-card .nc-name{font-size:17px; font-weight:600; font-family:'Barlow Condensed',sans-serif; margin-top:1px;}
  .next-card .nc-meta{font-size:11.5px; color:var(--text-dim); margin-top:1px;}
  .seg-cap{font-size:14px; margin-right:2px; opacity:0.85; flex-shrink:0;}

  /* Strength: exercise list */
  .ex-card{display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px 16px; margin-bottom:10px; cursor:pointer;}
  .ex-card .ex-icon{width:44px; height:44px; border-radius:12px; background:var(--panel-2); display:flex; align-items:center; justify-content:center; font-size:21px; flex-shrink:0;}
  .ex-card .ex-info{flex:1; min-width:0;}
  .ex-card .ex-name{font-size:15.5px; font-weight:600;}
  .ex-card .ex-meta{font-size:11.5px; color:var(--text-faint); margin-top:2px;}

  /* Exercise player */
  #exercisePlayer{position:fixed; inset:0; background:var(--bg); display:none; flex-direction:column; z-index:55;}
  #exercisePlayer.active{display:flex;}
  #exercisePlayer .player-mid{justify-content:flex-start;}
  .filmstrip{display:flex; gap:8px; justify-content:center; margin:2px 0 18px; flex-wrap:wrap;}
  .filmstrip-item{width:60px; text-align:center; opacity:0.55; transition:opacity .3s;}
  .filmstrip-item.current{opacity:1;}
  .filmstrip-item svg{width:60px; height:66px; background:rgba(255,255,255,0.03); border-radius:10px; border:1px solid var(--line); display:block;}
  .filmstrip-item.current svg{border-color:var(--hard);}
  .filmstrip-item .fs-label{font-size:8.5px; color:var(--text-faint); margin-top:4px; text-transform:uppercase; letter-spacing:0.03em; line-height:1.2;}
  .figure-stage{width:100%; max-width:200px; display:flex; align-items:center; justify-content:center; margin:0 auto 8px;}
  .figure-stage svg{width:160px; height:170px;}
  .set-badge{display:inline-block; font-size:13px; text-transform:uppercase; letter-spacing:0.1em; padding:6px 16px; border-radius:99px; background:rgba(242,153,74,0.16); color:var(--hard); margin-bottom:10px;}
  .set-target{color:var(--text-dim); font-size:14px; margin-bottom:18px;}
  .load-callout{background:rgba(242,153,74,0.12); border:1px solid rgba(242,153,74,0.35); border-radius:12px; padding:10px 16px; font-size:15px; font-weight:600; margin-bottom:16px; display:inline-block;}
  .load-callout span{font-weight:500; color:var(--text-faint); font-size:12px;}
  .rest-label{font-size:12px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:10px;}
  .ex-cues{margin-top:20px; text-align:left; width:100%; max-width:290px;}
  .player-kind{font-size:13px; text-transform:uppercase; letter-spacing:0.14em; padding:6px 16px; border-radius:99px; margin-bottom:16px;}
  .player-time{font-family:'JetBrains Mono',monospace; font-size:76px; font-weight:700; line-height:1; letter-spacing:-2px;}
  .player-label{font-size:20px; margin-top:10px; font-family:'Barlow Condensed',sans-serif; font-weight:600;}
  .player-note{color:var(--text-dim); font-size:13.5px; margin-top:4px;}
  .player-dots{display:flex; gap:6px; margin-top:16px; flex-wrap:wrap; justify-content:center; max-width:280px;}
  .p-dot{width:7px; height:7px; border-radius:50%; background:var(--line);}
  .p-dot.filled{background:var(--text-dim);}
  .p-dot.now{background:var(--hard);}
  .player-controls{display:flex; gap:12px; padding:24px 22px 40px;}
  .ctrl-btn{flex:1; padding:17px 0; border-radius:16px; text-align:center; font-size:15px; font-weight:600; cursor:pointer; border:1px solid var(--line); background:var(--panel);}
  #playerRestart, #exRestart{flex:0 0 54px; font-size:20px;}
  .ctrl-btn.main{background:var(--hard); color:#1A1206; border:none;}

  /* Modal / sheet */
  .overlay{position:fixed; inset:0; background:rgba(6,8,20,0.72); display:none; align-items:flex-end; z-index:60;}
  .overlay.active{display:flex;}
  .sheet{background:var(--panel); width:100%; border-radius:22px 22px 0 0; padding:26px 22px 34px; max-height:85vh; overflow-y:auto;}
  .sheet h3{font-size:22px; margin:0 0 4px; font-family:'Barlow Condensed',sans-serif;}
  .sheet p.hint{color:var(--text-faint); font-size:13px; margin:0 0 18px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:7px;}
  .field input[type=date], .field input[type=number], .field textarea{width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:11px 12px; color:var(--text); font-size:15px; font-family:'Inter',sans-serif;}
  .field textarea{min-height:70px; resize:vertical;}
  .rpe-row{display:flex; gap:6px; flex-wrap:wrap;}
  .rpe-pill{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--panel-2); border:1px solid var(--line); font-size:13px; font-family:'JetBrains Mono',monospace; cursor:pointer;}
  .rpe-pill.sel{background:var(--hard); color:#1A1206; border-color:var(--hard);}
  .sheet-actions{display:flex; gap:10px; margin-top:6px;}

  ::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <div class="brand">
      <div class="name display">Gradient</div>
      <div class="sub" id="weekLabel">—</div>
    </div>
    <div class="gear" id="settingsBtn">⚙</div>
  </header>

  <div class="profile-wrap" id="profileWrap"></div>

  <main>
    <div class="view active" id="view-today">
      <div id="todayCardHolder"></div>
      <h2 class="section-title">This week</h2>
      <div id="weekMini"></div>
    </div>

    <div class="view" id="view-week">
      <h2 class="section-title">Calendar</h2>
      <div id="weekList"></div>
    </div>

    <div class="view" id="view-progress">
      <h2 class="section-title">Progress</h2>
      <div class="stat-grid" id="statGrid"></div>
      <h2 class="section-title">History</h2>
      <div id="historyList"></div>
    </div>

    <div class="view" id="view-strength">
      <h2 class="section-title">Off-bike strength</h2>
      <p class="hint" style="margin:0 0 14px;">Trial page — one exercise for now, more to follow.</p>
      <div id="exerciseList"></div>
    </div>
  </main>

  <nav class="bottom">
    <div class="nav-inner">
      <div class="nav-btn active" data-view="today">Today</div>
      <div class="nav-btn" data-view="week">Calendar</div>
      <div class="nav-btn" data-view="progress">Progress</div>
      <div class="nav-btn" data-view="strength">Strength</div>
    </div>
  </nav>

  <!-- Workout player -->
  <div id="player">
    <div class="player-top">
      <div class="player-close" id="playerClose">Exit</div>
      <div class="player-phase" id="playerWorkoutName"></div>
      <div style="width:32px"></div>
    </div>
    <div class="player-mid">
      <div class="gauge-panel">
        <div class="pedal-row">
          <svg class="pedal-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="46" fill="none" stroke="var(--line)" stroke-width="3"/>
            <g class="pedal-rotor" id="pedalRotor">
              <line x1="50" y1="50" x2="50" y2="9" stroke="var(--hard)" stroke-width="6" stroke-linecap="round"/>
              <line x1="50" y1="50" x2="50" y2="91" stroke="var(--easy)" stroke-width="6" stroke-linecap="round"/>
              <circle cx="50" cy="9" r="7" fill="var(--hard)"/>
              <circle cx="50" cy="91" r="7" fill="var(--easy)"/>
            </g>
            <circle cx="50" cy="50" r="4.5" fill="var(--text-dim)"/>
          </svg>
          <div class="pedal-target">
            <div class="pl">Match cadence</div>
            <b id="cadenceLabel">— rpm</b>
          </div>
        </div>
        <div class="ladder" id="playerLadder"></div>
        <div class="ladder-phrase" id="playerPhrase"></div>
      </div>

      <div class="player-kind" id="playerKindTag"></div>
      <div class="player-time mono" id="playerTime">00:00</div>
      <div class="player-label" id="playerSegLabel"></div>
      <div class="player-note" id="playerSegNote"></div>
      <div class="food-wrap">
        <div class="food-track"><div class="food-fill" id="foodFill"></div></div>
        <div class="food-caption" id="foodCaption"></div>
        <div class="food-burned" id="foodBurned"></div>
      </div>

      <div class="next-card" id="nextCard"></div>
      <div class="player-dots" id="playerDots"></div>
    </div>
    <div class="player-controls">
      <div class="ctrl-btn" id="playerRestart" title="Start this session over">↺</div>
      <div class="ctrl-btn" id="playerSkip">Skip</div>
      <div class="ctrl-btn main" id="playerPause">Pause</div>
    </div>
  </div>

  <!-- Exercise player (strength trial) -->
  <div id="exercisePlayer">
    <div class="player-top">
      <div class="player-close" id="exClose">Exit</div>
      <div class="player-phase" id="exTitle"></div>
      <div class="player-close" id="exRestart" title="Start this exercise over">↺</div>
    </div>
    <div class="player-mid">
      <div class="filmstrip" id="exFilmstrip"></div>
      <div class="figure-stage" id="exFigureStage"></div>
      <div id="exAction"></div>
    </div>
  </div>

  <!-- Generic bottom sheet overlay -->
  <div class="overlay" id="overlay">
    <div class="sheet" id="sheetContent"></div>
  </div>

       through the media pipeline, which iOS lets ignore the physical silent switch. -->

/* ---- Effort ladder: what's still possible at each RPE ("the talk test", gamified) ---- */
const RPE_LADDER = [
  {min:1, max:2,  icon:'📖', label:'Read a book'},
  {min:3, max:3,  icon:'💬', label:'Chat freely'},
  {min:4, max:5,  icon:'📱', label:'Talk on the phone'},
  {min:6, max:6,  icon:'🗣️', label:'Full sentences'},
  {min:7, max:7,  icon:'😤', label:'Short phrases only'},
  {min:8, max:8,  icon:'😣', label:'One-word answers'},
  {min:9, max:9,  icon:'😖', label:'Grunt, can\'t talk'},
  {min:10,max:10, icon:'🥵', label:'Nothing but this'},
];
function parseRpe(note){
  if(!note) return null;
  const m = note.match(/RPE\s*(\d+)(?:[\u2013\u2012-](\d+))?/);
  if(!m) return null;
  return m[2] ? Math.round((parseInt(m[1],10)+parseInt(m[2],10))/2) : parseInt(m[1],10);
}
function tierIndexForRpe(rpe){
  if(rpe==null) return 1;
  let idx = RPE_LADDER.findIndex(t=>rpe>=t.min && rpe<=t.max);
  return idx===-1 ? RPE_LADDER.length-1 : idx;
}
function parseCadence(note, kind){
  if(note){
    const m = note.match(/cadence\s*(\d+)(?:[\u2013\u2012-](\d+))?/i);
    if(m) return m[2] ? Math.round((parseInt(m[1],10)+parseInt(m[2],10))/2) : parseInt(m[1],10);
  }
  const defaults = {easy:90, hard:88, grind:60, rest:92};
  return defaults[kind] || 88;
}

async function storageGet(key){
  try{
    if(window.storage && window.storage.get){
      const r = await window.storage.get(key);
      return r ? JSON.parse(r.value) : null;
    }
  }catch(e){ /* fall through to localStorage */ }
  try{
    const v = localStorage.getItem('gradient:'+key);
    return v ? JSON.parse(v) : null;
  }catch(e){ return null; }
}
async function storageSet(key, val){
  try{
    if(window.storage && window.storage.set){
      await window.storage.set(key, JSON.stringify(val));
      return;
    }
  }catch(e){ /* fall through to localStorage */ }
  try{ localStorage.setItem('gradient:'+key, JSON.stringify(val)); }
  catch(e){ console.error('storage set failed', e); }
}

// Simulates day-by-day schedule progress from startDate to today (plus a few projected days ahead).
// Rules: completing a bike session advances the programme by one day.
// Missing a day just leaves the programme where it was (next time you train, you get the
// step you missed — not whatever today's calendar slot would otherwise be).
// If NO training (bike or strength) happens for 7+ consecutive real days, the programme
// steps back a week to reintroduce load more gently.
function buildDaySequence(projectDays){
  const start = new Date(settings.startDate+'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  let totalRealDays = Math.round((today-start)/86400000);
  if(totalRealDays<0) totalRealDays = 0;
  if(totalRealDays>3650) totalRealDays = 3650; // safety cap (~10 years)

  const seq = [];
  let pos = 0, idleDays = 0;
  for(let d=0; d<=totalRealDays; d++){
    const date = addDays(start, d);
    const dISO = iso(date);
    const bikeDone = !!logs[dISO];
    const anyTrained = bikeDone || strengthDatesSet.has(dISO);
    const weekIdx = Math.floor(pos/7), dayIdx = pos%7;
    const daySched = getWeekSchedule(weekIdx).days[dayIdx];
    seq.push({dISO, date, weekIdx, dayIdx, bikeKey:daySched.bike, strengthDay:daySched.strength,
      bikeDone, strengthDone:strengthDatesSet.has(dISO), pos, isToday:d===totalRealDays});

    if(d>0){
      if(anyTrained){ idleDays = 0; }
      else { idleDays++; if(idleDays>=7){ pos = Math.max(0,pos-7); idleDays = 0; } }
    }
    if(bikeDone) pos = pos+1;
  }

  let projPos = pos;
  for(let i=1;i<=projectDays;i++){
    const date = addDays(today,i);
    const dISO = iso(date);
    const weekIdx = Math.floor(projPos/7), dayIdx = projPos%7;
    const daySched = getWeekSchedule(weekIdx).days[dayIdx];
    seq.push({dISO, date, weekIdx, dayIdx, bikeKey:daySched.bike, strengthDay:daySched.strength,
      bikeDone: !!logs[dISO], strengthDone: strengthDatesSet.has(dISO), pos:projPos, isToday:false, projected:true});
    projPos = projPos+1;
  }
  return seq;
}

function getTodayEntry(){
  const seq = buildDaySequence(0);
  return seq[seq.length-1];
}

/* ================= RENDER: PROFILE (signature element) ================= */
function buildProfileSVG(opts){
  const {width=440,height=110,markerFrac=0,plateau=false} = opts;
  const n = ELEV.length;
  const padX=6;
  const plateauW = plateau ? 74 : 0;
  const w = (width - padX*2) - plateauW;
  const pts = ELEV.map((v,i)=>({
    x: padX + (i/(n-1))*w,
    y: height*0.92 - (v/70)*(height*0.72)
  }));
  // smooth build-up path via simple bezier through midpoints
  let d = `M ${pts[0].x},${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i], p1=pts[i+1];
    const mx=(p0.x+p1.x)/2;
    d += ` C ${mx},${p0.y} ${mx},${p1.y} ${p1.x},${p1.y}`;
  }

  const last = pts[n-1];
  const plateauEndX = last.x + plateauW;
  const plateauMidX = last.x + plateauW*0.5;
  const plateauPath = plateau ? `M ${last.x},${last.y} C ${plateauMidX},${last.y-3} ${plateauMidX},${last.y+3} ${plateauEndX},${last.y}` : '';

  const fillEndX = plateau ? plateauEndX : last.x;
  const fillD = d + (plateau ? ` C ${plateauMidX},${last.y-3} ${plateauMidX},${last.y+3} ${plateauEndX},${last.y}` : '') + ` L ${fillEndX},${height} L ${pts[0].x},${height} Z`;

  // marker position: rides the build-up path while climbing, parks on the plateau once in maintenance
  let mx, my;
  if(plateau){
    mx = last.x + plateauW*0.8; my = last.y;
  } else {
    const mf = Math.max(0, Math.min(1, markerFrac));
    const idxF = mf*(n-1);
    const i0=Math.floor(idxF), i1=Math.min(i0+1,n-1), t=idxF-i0;
    mx = pts[i0].x + (pts[i1].x-pts[i0].x)*t;
    my = pts[i0].y + (pts[i1].y-pts[i0].y)*t;
  }

  const p1End = ((PHASE1_WEEKS-1)/(n-1))*w+padX;

  return `
  <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="gradFill" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#6FB7E0"/>
        <stop offset="${(p1End/width*100).toFixed(0)}%" stop-color="#6FB7E0"/>
        <stop offset="100%" stop-color="#E0574A"/>
      </linearGradient>
      <linearGradient id="gradFade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(255,255,255,0.16)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
    </defs>
    <path d="${fillD}" fill="url(#gradFade)"/>
    <path d="${d}" fill="none" stroke="url(#gradFill)" stroke-width="3" stroke-linecap="round"/>
    ${plateau ? `<path d="${plateauPath}" fill="none" stroke="#E0574A" stroke-width="3" stroke-linecap="round" stroke-dasharray="1,7"/>` : ''}
    <line x1="${mx}" y1="${my}" x2="${mx}" y2="${height}" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="2,3"/>
    <circle cx="${mx}" cy="${my}" r="6.5" fill="#10142A" stroke="#F4F1E9" stroke-width="2.5"/>
  </svg>`;
}

function renderProfile(){
  const today = getTodayEntry();
  const inMaintenance = today.weekIdx >= BUILDUP_WEEKS;
  const frac = inMaintenance ? 1 : (today.weekIdx + today.dayIdx/7)/(BUILDUP_WEEKS-1);
  document.getElementById('profileWrap').innerHTML = buildProfileSVG({markerFrac:frac, plateau:inMaintenance}) +
    `<div class="profile-caption"><span>Week 1</span><span>${inMaintenance ? 'Maintenance' : 'Cruising altitude'}</span></div>`;
}

/* ================= RENDER: TODAY ================= */
function fmtMin(sec){ return Math.round(sec/60)+' min'; }
const TYPE_ICON = '🚴', STRENGTH_ICON = '🏋️';

function renderToday(){
  const today = getTodayEntry();
  const sched = getWeekSchedule(today.weekIdx);
  if(today.weekIdx >= BUILDUP_WEEKS){
    const maintWeek = today.weekIdx - BUILDUP_WEEKS + 1;
    document.getElementById('weekLabel').textContent = `Maintenance · Week ${maintWeek} · ${sched.focus}`;
  } else {
    document.getElementById('weekLabel').textContent = `Week ${today.weekIdx+1} of ${BUILDUP_WEEKS} · ${sched.focus}`;
  }

  const key = today.bikeKey;
  const type = TYPES[key];
  const dISO = today.dISO;
  const done = today.bikeDone;
  const dur = totalSeconds(type);

  let segHTML = '';
  if(type.segments){
    segHTML = '<div class="segment-list">' + type.segments.map(s=>{
      const tier = RPE_LADDER[tierIndexForRpe(parseRpe(s.note))];
      return `
      <div class="seg-row">
        <div class="seg-dot" style="background:${kindColor(s.kind)}"></div>
        <div class="seg-cap" title="${tier.label}">${tier.icon}</div>
        <div class="seg-label">${s.label}<div class="seg-note">${s.note}</div></div>
        <div class="seg-time">${fmtClock(s.seconds)}</div>
      </div>`;
    }).join('') + '</div>';
  }

  let actionHTML = '';
  if(done){
    actionHTML = `<button class="btn btn-done" disabled>✓ Completed${logs[dISO].rpe?(' · RPE '+logs[dISO].rpe):''}</button>`;
  } else if(type.rest){
    actionHTML = `<button class="btn btn-ghost" id="markRestBtn">Mark as rested</button>`;
  } else if(type.outdoor){
    actionHTML = `<button class="btn btn-primary" id="logOutdoorBtn">Log this ride</button>`;
  } else {
    actionHTML = `<button class="btn btn-primary" id="startWorkoutBtn">Start workout</button>`;
  }

  let html = `
    <div class="today-card">
      <div class="tag">${TYPE_ICON} Today's ride</div>
      <h1 class="display">${type.name}</h1>
      <p class="tagline">${type.tagline}</p>
      ${dur ? `<div class="stat-row"><div class="stat"><b>${fmtMin(dur)}</b><span>Duration</span></div></div>` : ''}
      ${actionHTML}
      ${segHTML}
    </div>`;

  if(today.strengthDay){
    const doneStrength = today.strengthDone;
    html += `
    <div class="today-card" style="margin-top:14px;">
      <div class="tag">${STRENGTH_ICON} Today's strength</div>
      <h1 class="display" style="font-size:26px;">Full Body Strength</h1>
      <p class="tagline">${STRENGTH_SESSION.length} exercises — squats, hinge, row, push, core.</p>
      ${doneStrength ? `<button class="btn btn-done" disabled>✓ Logged today</button>` : `<button class="btn btn-primary" id="openStrengthBtn">Start strength session →</button>`}
    </div>`;
  }

  document.getElementById('todayCardHolder').innerHTML = html;

  attachTodayHandlers(key, dISO);
  renderWeekMini();
}

function kindColor(kind){
  return {easy:'var(--easy)', hard:'var(--hard)', grind:'var(--grind)', rest:'var(--rest)'}[kind] || 'var(--rest)';
}
function fmtClock(sec){ const m=Math.floor(sec/60), s=sec%60; return `${m}:${s.toString().padStart(2,'0')}`; }

function attachTodayHandlers(key, dISO){
  const startBtn = document.getElementById('startWorkoutBtn');
  if(startBtn) startBtn.onclick = ()=>startPlayer(key, dISO);
  const restBtn = document.getElementById('markRestBtn');
  if(restBtn) restBtn.onclick = async ()=>{ logs[dISO]={typeKey:'rest', completedAt:Date.now()}; await saveLogs(); renderAll(); };
  const outdoorBtn = document.getElementById('logOutdoorBtn');
  if(outdoorBtn) outdoorBtn.onclick = ()=>openOutdoorSheet(dISO);
  const openStrengthBtn = document.getElementById('openStrengthBtn');
  if(openStrengthBtn) openStrengthBtn.onclick = startFullSession;
}

function renderWeekMini(){
  const seq = buildDaySequence(6).slice(-7); // last available day (today) + next 6 projected
  document.getElementById('weekMini').innerHTML = seq.map(entry=>dayEntryCardHTML(entry, 'mini')).join('');
  attachDayCardHandlers('#weekMini');
}

/* ================= RENDER: PROGRAMME VIEW (merged spin + strength) ================= */
function dayEntryCardHTML(entry, mode){
  const bikeType = TYPES[entry.bikeKey];
  const showBike = programmeFilter!=='strength';
  const showStrength = entry.strengthDay && programmeFilter!=='spin';
  const dLabel = entry.date.toLocaleDateString(undefined,{weekday:'short'});
  let cards = '';
  if(showBike){
    cards += `<div class="day-card ${entry.isToday?'today':''} ${entry.bikeDone?'done':''}" data-diso="${entry.dISO}" data-kind="bike">
      <div class="day-num"><div class="dow">${dLabel}</div><div class="d">${entry.date.getDate()}</div></div>
      <div class="prog-icon">${TYPE_ICON}</div>
      <div class="day-info"><div class="wname">${bikeType.name}</div><div class="wmeta">${bikeType.segments?fmtMin(totalSeconds(bikeType)):(bikeType.outdoor?'Outdoor ride':'Rest')}</div></div>
      <div class="day-status">${entry.bikeDone?'✓':`<div class="badge-dot" style="background:${bikeType.color}"></div>`}</div>
    </div>`;
  }
  if(showStrength){
    cards += `<div class="day-card ${entry.isToday?'today':''} ${entry.strengthDone?'done':''}" data-diso="${entry.dISO}" data-kind="strength">
      <div class="day-num"><div class="dow">${dLabel}</div><div class="d">${entry.date.getDate()}</div></div>
      <div class="prog-icon">${STRENGTH_ICON}</div>
      <div class="day-info"><div class="wname">Full Body Strength</div><div class="wmeta">${STRENGTH_SESSION.length} exercises</div></div>
      <div class="day-status">${entry.strengthDone?'✓':`<div class="badge-dot" style="background:var(--grind)"></div>`}</div>
    </div>`;

  return cards;
}

function renderCalendarView(){
  const monthStart = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), 1);
  const monthEnd = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth()+1, 0);
  const daysInMonth = monthEnd.getDate();
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const todayStr = todayISO();
  const daysAheadNeeded = Math.max(0, Math.ceil((monthEnd-todayD)/86400000));
  const seq = buildDaySequence(daysAheadNeeded);
  const seqByDate = {}; seq.forEach(e=>{ seqByDate[e.dISO]=e; });

  const startOffset = (monthStart.getDay()+6)%7; // Monday-first
  let cells = '';
  for(let i=0;i<startOffset;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const date = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), d);
    const dISO = iso(date);
    const bikeDone = !!logs[dISO];
    const strengthDone = strengthDatesSet.has(dISO);
    const isToday = dISO===todayStr;
    const entry = seqByDate[dISO];
    const isPastMissed = date < todayD && entry && !TYPES[entry.bikeKey].rest && !bikeDone;
    const dots = [];
    if(programmeFilter!=='strength' && bikeDone) dots.push(`<span class="cal-dot" style="background:var(--easy)"></span>`);
    if(programmeFilter!=='spin' && strengthDone) dots.push(`<span class="cal-dot" style="background:var(--grind)"></span>`);
    cells += `<div class="cal-cell ${isToday?'today':''} ${isPastMissed?'missed':''}" data-diso="${dISO}">
      <div class="cal-daynum">${d}</div>
      <div class="cal-dots">${dots.join('')}</div>
    </div>`;
  }

  document.getElementById('weekList').innerHTML = `
    <div class="filter-chips">
      <div class="chip ${programmeFilter==='all'?'active':''}" data-f="all">All</div>
      <div class="chip ${programmeFilter==='spin'?'active':''}" data-f="spin">${TYPE_ICON} Spin</div>
      <div class="chip ${programmeFilter==='strength'?'active':''}" data-f="strength">${STRENGTH_ICON} Strength</div>
    </div>
    <div class="cal-header">
      <div class="cal-nav" id="calPrev">‹</div>
      <div class="cal-month">${calendarMonth.toLocaleDateString(undefined,{month:'long', year:'numeric'})}</div>
      <div class="cal-nav" id="calNext">›</div>
    </div>
    <div class="cal-grid cal-weekday-row">${['Mo','Tu','We','Th','Fr','Sa','Su'].map(w=>`<div class="cal-wd">${w}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
  `;
  document.querySelectorAll('#weekList .chip').forEach(el=>{
    el.onclick = ()=>{ programmeFilter = el.dataset.f; renderCalendarView(); };
  });
  document.getElementById('calPrev').onclick = ()=>{ calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth()-1, 1); renderCalendarView(); };
  document.getElementById('calNext').onclick = ()=>{ calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth()+1, 1); renderCalendarView(); };
  document.querySelectorAll('#weekList .cal-cell:not(.empty)').forEach(el=>{
    el.onclick = ()=>openCalendarDaySheet(el.dataset.diso);
  });
}

function openCalendarDaySheet(dISO){
  const target = new Date(dISO+'T00:00:00');
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const dateLabel = target.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'});
  const bikeLog = logs[dISO];
  const strengthEntries = strengthLog.filter(e=>iso(new Date(e.completedAt))===dISO);

  if(!bikeLog && strengthEntries.length===0 && target>=todayD){
    // Nothing logged yet for a current/future day — fall back to the actionable day sheet
    openDaySheet(dISO, 'bike');
    return;
  }

  let body = `<h3>${dateLabel}</h3>`;
  if(!bikeLog && strengthEntries.length===0){
    body += `<p class="hint">No session logged for this day.</p>`;
  } else {
    if(bikeLog){
      const t = TYPES[bikeLog.typeKey] || {name:bikeLog.typeKey};
      body += `<p style="color:var(--text-dim); font-size:14px; margin:0 0 8px;">${TYPE_ICON} ${t.name}${bikeLog.rpe?(' · RPE '+bikeLog.rpe):''}${bikeLog.notes?('<br>“'+escapeHtml(bikeLog.notes)+'”'):''}</p>`;
    }
    strengthEntries.forEach(e=>{
      const exType = EXERCISES[e.exerciseId] || {name:e.exerciseId};
      body += `<p style="color:var(--text-dim); font-size:14px; margin:0 0 8px;">${STRENGTH_ICON} ${exType.name}${e.rpe!=null?(' · RPE '+e.rpe):''}${e.weight?(' · '+e.weight+'kg'):''}</p>`;
    });
  }
  openSheet(body + `<div class="sheet-actions"><button class="btn btn-ghost" id="closeCalSheet">Close</button></div>`);
  document.getElementById('closeCalSheet').onclick = closeSheet;
}

function attachDayCardHandlers(containerSel){
  document.querySelectorAll(containerSel+' .day-card').forEach(el=>{
    el.onclick = ()=>{
      openDaySheet(el.dataset.diso, el.dataset.kind);
    };
  });
}

function openDaySheet(dISO, kind){
  const seq = buildDaySequence(6);
  const entry = seq.find(e=>e.dISO===dISO);
  if(!entry) return;
  const dateLabel = entry.date.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'});

  if(kind==='strength'){
    let body = `<h3>${STRENGTH_ICON} Full Body Strength</h3><p class="hint">${dateLabel}</p>`;
    if(entry.strengthDone){
      body += `<p style="color:var(--text-dim); font-size:14px;">Logged for this day.</p>`;
    } else {
      body += `<p class="hint">${STRENGTH_SESSION.length} exercises — open the Strength tab to run through them.</p><div class="sheet-actions"><button class="btn btn-primary" id="sheetOpenStrength">Open Strength tab</button></div>`;
    }
    openSheet(body);
    const os = document.getElementById('sheetOpenStrength'); if(os) os.onclick=()=>{ closeSheet(); document.querySelector('.nav-btn[data-view="strength"]').click(); };
    return;
  }

  const key = entry.bikeKey;
  const type = TYPES[key];
  const done = logs[dISO];
  let body = `<h3>${TYPE_ICON} ${type.name}</h3><p class="hint">${dateLabel}</p>`;
  if(done){
    body += `<p style="color:var(--text-dim); font-size:14px;">Marked complete${done.rpe?(' · RPE '+done.rpe):''}${done.notes?('<br>“'+escapeHtml(done.notes)+'”'):''}</p>`;
    body += `<div class="sheet-actions"><button class="btn btn-outline-danger" id="undoBtn">Undo</button></div>`;
  } else if(type.rest){
    body += `<p class="hint">Rest day — no session scheduled.</p><div class="sheet-actions"><button class="btn btn-ghost" id="sheetRestBtn">Mark as rested</button></div>`;
  } else if(type.outdoor){
    body += `<p class="hint">${type.tagline}</p><div class="sheet-actions"><button class="btn btn-primary" id="sheetOutdoorBtn">Log this ride</button></div>`;
  } else {
    body += `<p class="hint">${type.tagline} · ${fmtMin(totalSeconds(type))}</p><div class="sheet-actions"><button class="btn btn-primary" id="sheetStartBtn">Start workout</button></div>`;
  }
  openSheet(body);
  const su = document.getElementById('undoBtn'); if(su) su.onclick=async()=>{ delete logs[dISO]; await saveLogs(); closeSheet(); renderAll(); };
  const sr = document.getElementById('sheetRestBtn'); if(sr) sr.onclick=async()=>{ logs[dISO]={typeKey:'rest', completedAt:Date.now()}; await saveLogs(); closeSheet(); renderAll(); };
  const so = document.getElementById('sheetOutdoorBtn'); if(so) so.onclick=()=>{ closeSheet(); openOutdoorSheet(dISO); };
  const ss = document.getElementById('sheetStartBtn'); if(ss) ss.onclick=()=>{ closeSheet(); startPlayer(key,dISO); };
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ================= RENDER: PROGRESS VIEW ================= */
function renderProgressView(){
  const bikeEntries = Object.entries(logs);
  const completedSessions = bikeEntries.filter(([,v])=>v.typeKey!=='rest').length;
  const seq = buildDaySequence(0);
  // streak: consecutive scheduled non-rest days completed, walking backward from today
  let streak=0;
  for(let i=seq.length-1;i>=0;i--){
    const entry = seq[i];
    if(TYPES[entry.bikeKey].rest) continue;
    if(entry.bikeDone) streak++; else break;
  }
  const today = seq[seq.length-1];
  const weekEntries = seq.filter(e=>e.weekIdx===today.weekIdx);
  const weekScheduled = weekEntries.filter(e=>!TYPES[e.bikeKey].rest).length || weekEntries.length;
  const weekDone = weekEntries.filter(e=>e.bikeDone).length;

  // Average how-did-it-feel score across the last 7 days, bike + strength combined —
  // a quick pulse check on whether the current load feels right.
  const sevenDaysAgo = Date.now() - 7*86400000;
  const recentRpes = [];
  bikeEntries.forEach(([dISO,v])=>{ if(v.rpe!=null && new Date(dISO+'T12:00:00').getTime()>=sevenDaysAgo) recentRpes.push(Number(v.rpe)); });
  strengthLog.forEach(e=>{ if(e.rpe!=null && e.completedAt>=sevenDaysAgo) recentRpes.push(Number(e.rpe)); });
  const avgRpe = recentRpes.length ? (recentRpes.reduce((a,b)=>a+b,0)/recentRpes.length).toFixed(1) : '—';

  const progWeekLabel = today.weekIdx >= BUILDUP_WEEKS
    ? `Maint. wk ${today.weekIdx - BUILDUP_WEEKS + 1}`
    : `${today.weekIdx+1}/${BUILDUP_WEEKS}`;
  document.getElementById('statGrid').innerHTML = `
    <div class="stat-box"><b>${completedSessions}</b><span>Total rides logged</span></div>
    <div class="stat-box"><b>${streak}</b><span>Day streak</span></div>
    <div class="stat-box"><b>${weekDone}/${weekScheduled}</b><span>Rides done this week</span></div>
    <div class="stat-box"><b>${progWeekLabel}</b><span>Programme week</span></div>
    <div class="stat-box"><b>${avgRpe}</b><span>Avg effort, last 7 days</span></div>
  `;

  // Unified history — rides and strength sessions together, most recent first
  const bikeHist = bikeEntries.map(([dISO,v])=>({
    ts: new Date(dISO+'T12:00:00').getTime(), dISO, icon:TYPE_ICON,
    name:(TYPES[v.typeKey]||{name:v.typeKey}).name, rpe:v.rpe
  }));
  const strengthHist = strengthLog.map(e=>({
    ts:e.completedAt, dISO: iso(new Date(e.completedAt)), icon:STRENGTH_ICON,
    name:(EXERCISES[e.exerciseId]||{name:e.exerciseId}).name, rpe:e.rpe
  }));
  const combined = bikeHist.concat(strengthHist).sort((a,b)=>b.ts-a.ts).slice(0,30);

  document.getElementById('historyList').innerHTML = combined.length ? combined.map(item=>{
    const d = new Date(item.dISO+'T00:00:00');
    const feel = item.rpe!=null ? RPE_LADDER[tierIndexForRpe(Number(item.rpe))] : null;
    return `<div class="log-row">
      <div><div class="lname">${item.icon} ${item.name}</div><div class="lmeta">${d.toLocaleDateString(undefined,{month:'short',day:'numeric'})}${item.rpe!=null?(' · RPE '+item.rpe):''}</div></div>
      ${feel ? `<div class="log-feel" title="${feel.label}">${feel.icon}</div>` : ''}
    </div>`;
  }).join('') : `<p class="hint" style="margin-top:0;">No sessions logged yet.</p>`;
}

/* ================= UPDATE CHECK ================= */
async function checkForUpdate(url){
  if(!url){
    openSheet(`<h3>No update source set</h3><p class="hint">Paste the raw.githubusercontent.com URL of your index.html in Settings first — find it on GitHub by opening index.html and clicking "Raw".</p><div class="sheet-actions"><button class="btn btn-ghost" id="closeU">Close</button></div>`);
    document.getElementById('closeU').onclick = closeSheet;
    return;
  }
  openSheet(`<h3>Checking…</h3><p class="hint">Fetching the latest version from GitHub.</p>`);
  let text;
  try{
    const res = await fetch(url + (url.includes('?')?'&':'?') + 'cachebust=' + Date.now());
    text = await res.text();
  }catch(err){
    openSheet(`<h3>Couldn't check</h3><p class="hint">Network or CORS error reaching that URL. Double check it's the raw.githubusercontent.com link, not the github.io page.</p><div class="sheet-actions"><button class="btn btn-ghost" id="closeU">Close</button></div>`);
    document.getElementById('closeU').onclick = closeSheet;
    return;
  }
  const m = text.match(/APP_VERSION\s*=\s*'([^']+)'/);
  const remoteVersion = m ? m[1] : null;
  if(!remoteVersion){
    openSheet(`<h3>Couldn't read version</h3><p class="hint">That file doesn't look like a Gradient build.</p><div class="sheet-actions"><button class="btn btn-ghost" id="closeU">Close</button></div>`);
    document.getElementById('closeU').onclick = closeSheet;
    return;
  }
  if(remoteVersion === APP_VERSION){
    openSheet(`<h3>You're up to date</h3><p class="hint">Running ${APP_VERSION}.</p><div class="sheet-actions"><button class="btn btn-ghost" id="closeU">Close</button></div>`);
    document.getElementById('closeU').onclick = closeSheet;
    return;
  }
  openSheet(`
    <h3>Update available</h3>
    <p class="hint">You're on ${APP_VERSION}, GitHub has ${remoteVersion}. We'll download a dated backup of your progress first, then reload the app. Your progress stays on this device either way.</p>
    <div class="sheet-actions"><button class="btn btn-primary" id="doUpdate">Back up & update</button><button class="btn btn-ghost" id="cancelUpdate">Not now</button></div>
  `);
  document.getElementById('cancelUpdate').onclick = closeSheet;
  document.getElementById('doUpdate').onclick = ()=>{
    exportProgress();
    document.getElementById('sheetContent').innerHTML = `<h3>Updating…</h3><p class="hint">Backup downloaded. Reloading the app now.</p>`;
    setTimeout(()=>{ location.href = location.pathname + '?v=' + Date.now(); }, 1200);
  };
}

/* ================= EXPORT / IMPORT ================= */
function timestampForFilename(){
  const d = new Date();
  const pad = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
}
function exportProgress(){
  const payload = {app:'gradient', version:1, appVersion:APP_VERSION, exportedAt:new Date().toISOString(), settings, logs, strengthLog};
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gradient-backup-${timestampForFilename()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importProgress(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data || data.app!=='gradient' || !data.settings || !data.logs){
        openSheet(`<h3>Import failed</h3><p class="hint">That file doesn't look like a Gradient backup.</p><div class="sheet-actions"><button class="btn btn-ghost" id="closeImportErr">Close</button></div>`);
        document.getElementById('closeImportErr').onclick = closeSheet;
        return;
      }
      settings = data.settings;
      if(!settings.exerciseOverrides) settings.exerciseOverrides = {};
      logs = data.logs || {};
      strengthLog = data.strengthLog || [];
      strengthDatesSet = new Set(strengthLog.map(en=>iso(new Date(en.completedAt))));
      await saveSettings(); await saveLogs(); await storageSet('strengthLog', strengthLog);
      closeSheet(); renderAll();
    }catch(err){
      openSheet(`<h3>Import failed</h3><p class="hint">Couldn't read that file — make sure it's a Gradient backup JSON.</p><div class="sheet-actions"><button class="btn btn-ghost" id="closeImportErr">Close</button></div>`);
      document.getElementById('closeImportErr').onclick = closeSheet;
    }
  };
  reader.readAsText(file);
}

/* ================= AUDIO =================
   Uses real <audio> elements rather than Web Audio oscillators: iOS treats
   <audio>/<video> playback as "media", which ignores the physical silent
   switch — unlike short synthesized tones, which iOS silences.
   The very first beep() call must happen inside a user gesture (tapping
   Start), which is already how sessions begin, so this unlocks cleanly. */
function beep(kind){
  try{
    const id = kind==='chime' ? 'sndChime' : kind==='done' ? 'sndDone' : 'sndTick';
    const el = document.getElementById(id);
    el.currentTime = 0;
    el.play().catch(()=>{});
  }catch(e){}
}

/* Best-effort background keep-alive: continuous (near-silent) audio playback
   is one of the only ways a web page can retain any background execution on
   iOS. This is NOT guaranteed — Apple can suspend background web content at
   any time, especially for a home-screen web app with the screen locked, and
   there is no way for a website to force sound through a phone's silent
   switch beyond the media-playback behavior above. Treat this as "improves
   the odds", not a guarantee. */
function startKeepAlive(){
  try{
    const el = document.getElementById('sndKeepAlive');
    el.volume = 0.02;
    el.play().catch(()=>{});
  }catch(e){}
}
function stopKeepAlive(){
  try{
    const el = document.getElementById('sndKeepAlive');
    el.pause(); el.currentTime = 0;
  }catch(e){}
}

/* ================= WORKOUT PLAYER ================= */
function startPlayer(typeKey, dISO){
  const type = TYPES[typeKey];
  activePlayer = {
    typeKey, dISO,
    segments: type.segments,
    idx: 0,
    remaining: type.segments[0].seconds,
    paused: false,
    timer: null,
    food: pickFood(dISO+typeKey),
    kcalBurned: 0,
  };
  document.getElementById('playerWorkoutName').textContent = type.name;
  document.getElementById('player').classList.add('active');
  document.getElementById('pedalRotor').style.animationPlayState = 'running';
  requestWakeLock();
  startKeepAlive();
  renderPlayerSegment();
  tickPlayer(true);
  activePlayer.timer = setInterval(()=>tickPlayer(false), 1000);
}

function kindStyle(kind){
  const map = {easy:{bg:'rgba(111,183,224,0.16)', c:'var(--easy)'}, hard:{bg:'rgba(242,153,74,0.18)', c:'var(--hard)'}, grind:{bg:'rgba(224,87,74,0.18)', c:'var(--grind)'}, rest:{bg:'rgba(255,255,255,0.08)', c:'var(--text-dim)'}};
  return map[kind]||map.rest;
}

function renderPlayerSegment(){
  const seg = activePlayer.segments[activePlayer.idx];
  const st = kindStyle(seg.kind);
  const tag = document.getElementById('playerKindTag');
  tag.textContent = seg.kind.toUpperCase();
  tag.style.background = st.bg; tag.style.color = st.c;
  document.getElementById('playerSegLabel').textContent = seg.label;
  document.getElementById('playerSegNote').textContent = seg.note||'';

  const rpe = parseRpe(seg.note);
  const activeIdx = tierIndexForRpe(rpe);
  document.getElementById('playerLadder').innerHTML = RPE_LADDER.map((t,i)=>
    `<div class="ladder-item ${i===activeIdx?'active':(i<activeIdx?'passed':'')}">${t.icon}</div>`).join('');
  const tier = RPE_LADDER[activeIdx];
  document.getElementById('playerPhrase').innerHTML = `<span class="lead">Still possible</span>${tier.label}`;
  document.getElementById('playerTime').classList.toggle('maxeffort', activeIdx >= RPE_LADDER.length-2);

  const next = activePlayer.segments[activePlayer.idx+1];
  const nc = document.getElementById('nextCard');
  if(next){
    const nTier = RPE_LADDER[tierIndexForRpe(parseRpe(next.note))];
    const nSt = kindStyle(next.kind);
    nc.innerHTML = `
      <div class="nc-bar" style="background:${nSt.c}"></div>
      <div class="nc-icon">${nTier.icon}</div>
      <div class="nc-body">
        <div class="nc-eyebrow" style="color:${nSt.c}">Up next</div>
        <div class="nc-name">${next.label}</div>
        <div class="nc-meta">${fmtClock(next.seconds)} · ${next.note||''}</div>
      </div>`;
  } else {
    nc.innerHTML = `
      <div class="nc-bar" style="background:var(--success)"></div>
      <div class="nc-icon">🏁</div>
      <div class="nc-body">
        <div class="nc-eyebrow" style="color:var(--success)">Up next</div>
        <div class="nc-name">That's the last one</div>
        <div class="nc-meta">Finish strong</div>
      </div>`;
  }

  const cadence = parseCadence(seg.note, seg.kind);
  document.getElementById('cadenceLabel').textContent = cadence + ' rpm';
  document.getElementById('pedalRotor').style.animationDuration = (60/cadence).toFixed(2)+'s';

  const food = activePlayer.food;
  const fill = document.getElementById('foodFill');
  fill.textContent = (food.emoji+' ').repeat(24);
  fill.style.width = '100%';
  document.getElementById('foodCaption').textContent = `${food.emoji} Burning off ${food.name.toLowerCase()}`;
  document.getElementById('playerDots').innerHTML = activePlayer.segments.map((s,i)=>
    `<div class="p-dot ${i<activePlayer.idx?'filled':''} ${i===activePlayer.idx?'now':''}"></div>`).join('');
}

function tickPlayer(isInit){
  if(!activePlayer) return;
  if(!isInit){
    if(activePlayer.paused) return;
    activePlayer.remaining--;
  }
  if(activePlayer.remaining <= 0){
    // move to next segment
    if(activePlayer.remaining < 0 || !isInit){
      const isLast = activePlayer.idx+1 >= activePlayer.segments.length;
      beep(isLast ? 'done' : 'chime');
      activePlayer.idx++;
      if(activePlayer.idx >= activePlayer.segments.length){
        finishPlayer(); return;
      }
      activePlayer.remaining = activePlayer.segments[activePlayer.idx].seconds;
      renderPlayerSegment();
    }
  } else if(activePlayer.remaining <= 3 && !isInit){
    beep('tick');
  }
  document.getElementById('playerTime').textContent = fmtClock(Math.max(activePlayer.remaining,0));

  // shrink the food bar to match time left in this segment
  const seg = activePlayer.segments[activePlayer.idx];
  const frac = Math.max(0, Math.min(1, activePlayer.remaining / seg.seconds));
  document.getElementById('foodFill').style.width = (frac*100)+'%';

  if(!isInit && !activePlayer.paused){
    activePlayer.kcalBurned += (KCAL_PER_MIN[seg.kind]||6)/60;
    const burnedCount = (activePlayer.kcalBurned / activePlayer.food.kcal).toFixed(1);
    document.getElementById('foodBurned').textContent = `≈ ${burnedCount} ${activePlayer.food.name.toLowerCase()} burned so far`;
  }
}

document.getElementById('playerPause').onclick = ()=>{
  if(!activePlayer) return;
  activePlayer.paused = !activePlayer.paused;
  document.getElementById('playerPause').textContent = activePlayer.paused ? 'Resume' : 'Pause';
  document.getElementById('pedalRotor').style.animationPlayState = activePlayer.paused ? 'paused' : 'running';
};
document.getElementById('playerRestart').onclick = ()=>{
  if(!activePlayer) return;
  openSheet(`
    <h3>Restart this session?</h3>
    <p class="hint">Jump back to the very first segment. Nothing gets logged until you finish.</p>
    <div class="sheet-actions"><button class="btn btn-primary" id="csRestartYes">Restart</button><button class="btn btn-ghost" id="csRestartNo">Cancel</button></div>
  `);
  document.getElementById('csRestartNo').onclick = closeSheet;
  document.getElementById('csRestartYes').onclick = ()=>{
    closeSheet();
    activePlayer.idx = 0;
    activePlayer.remaining = activePlayer.segments[0].seconds;
    activePlayer.paused = false;
    activePlayer.kcalBurned = 0;
    document.getElementById('playerPause').textContent = 'Pause';
    document.getElementById('pedalRotor').style.animationPlayState = 'running';
    renderPlayerSegment();
    tickPlayer(true);
  };
};
document.getElementById('playerSkip').onclick = ()=>{
  if(!activePlayer) return;
  activePlayer.remaining = 0;
  tickPlayer(false);
};
document.getElementById('playerClose').onclick = ()=>{
  if(!activePlayer) return;
  clearInterval(activePlayer.timer);
  openSheet(`
    <h3>Exit workout?</h3>
    <p class="hint">Progress on this session will not be saved.</p>
    <div class="sheet-actions"><button class="btn btn-outline-danger" id="csYes">Yes, exit</button><button class="btn btn-ghost" id="csNo">Keep going</button></div>
  `);
  document.getElementById('csYes').onclick = ()=>{
    closeSheet();
    document.getElementById('player').classList.remove('active');
    document.getElementById('pedalRotor').style.animationPlayState='paused';
    releaseWakeLock();
    stopKeepAlive();
    activePlayer = null;
  };
  document.getElementById('csNo').onclick = ()=>{
    closeSheet();
    if(!activePlayer) return;
    activePlayer.timer = setInterval(()=>tickPlayer(false), 1000);
  };
};

function finishPlayer(){
  clearInterval(activePlayer.timer);
  document.getElementById('pedalRotor').style.animationPlayState='paused';
  releaseWakeLock();
  stopKeepAlive();
  const {typeKey, dISO} = activePlayer;
  document.getElementById('player').classList.remove('active');
  activePlayer = null;
  openSheet(`
    <h3>Session complete 🎉</h3>
    <p class="hint">${TYPES[typeKey].name} — nice work.</p>
    <div class="field"><label>How did it feel? (RPE 1–10)</label><div class="rpe-row" id="finRpe"></div></div>
    <div class="field"><label>Notes (optional)</label><textarea id="finNotes" placeholder="Anything worth remembering..."></textarea></div>
    <div class="sheet-actions"><button class="btn btn-done" id="finSave">Save</button></div>
  `);
  buildRpeRow('finRpe');
  document.getElementById('finSave').onclick = async ()=>{
    const rpe = document.querySelector('#finRpe .rpe-pill.sel');
    const notes = document.getElementById('finNotes').value;
    logs[dISO] = {typeKey, completedAt:Date.now(), rpe: rpe?rpe.dataset.v:null, notes: notes||null};
    await saveLogs(); closeSheet(); renderAll();
  };
}

/* ================= STRENGTH VIEW ================= */
function renderStrengthView(){
  const doneToday = STRENGTH_SESSION.filter(id=>strengthLog.some(e=>e.exerciseId===id && iso(new Date(e.completedAt))===todayISO())).length;
  const listHTML = Object.values(EXERCISES).map(ex=>{
    const sets = effectiveSets(ex);
    const scaled = sets < ex.sets ? ' · scaled back' : '';
    const doneTodayThis = strengthLog.some(e=>e.exerciseId===ex.id && iso(new Date(e.completedAt))===todayISO());
    let metaLine;
    if(ex.loadType==='hold'){
      const hold = effectiveHoldSeconds(ex);
      metaLine = `${sets} sets × ${hold}s hold${hold!==ex.holdSeconds? ' (adjusted)':''}`;
    } else if(ex.loadType==='weight' || ex.loadType==='weight_optional'){
      const w = recommendedWeightFor(ex.id);
      metaLine = `${sets} sets × ${ex.reps} reps${w!=null? ` · try ${w}kg` : ''}`;
    } else {
      metaLine = `${sets} sets × ${ex.reps} reps`;
    }
    return `
    <div class="ex-card" data-id="${ex.id}">
      <div class="ex-icon">${doneTodayThis?'✓':ex.icon}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">${metaLine}${scaled} · ${ex.target}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('exerciseList').innerHTML = `
    <button class="btn btn-primary" id="startFullSessionBtn" style="margin-bottom:16px;">
      ${doneToday>0 ? `Continue session (${doneToday}/${STRENGTH_SESSION.length} done today)` : `▶ Start full session (${STRENGTH_SESSION.length} exercises)`}
    </button>
    ${listHTML}
  `;
  document.getElementById('startFullSessionBtn').onclick = startFullSession;
  document.querySelectorAll('#exerciseList .ex-card').forEach(el=>{
    el.onclick = ()=>openExercise(el.dataset.id);
  });
}

/* Guided session: runs every exercise in STRENGTH_SESSION back-to-back, skipping ones
   already logged today so "Continue session" picks up where you left off. */
let sessionQueue = null;
function startFullSession(){
  const todayStr = todayISO();
  sessionQueue = STRENGTH_SESSION.filter(id=>!strengthLog.some(e=>e.exerciseId===id && iso(new Date(e.completedAt))===todayStr));
  if(sessionQueue.length===0){
    openSheet(`<h3>Already done 💪</h3><p class="hint">Every exercise in today's session is logged.</p><div class="sheet-actions"><button class="btn btn-ghost" id="closeFS">Close</button></div>`);
    document.getElementById('closeFS').onclick = closeSheet;
    return;
  }
  openNextInQueue();
}
function openNextInQueue(){
  if(!sessionQueue || sessionQueue.length===0){
    sessionQueue = null;
    openSheet(`<h3>Session complete 🎉</h3><p class="hint">Nice work — that's the full strength session for today.</p><div class="sheet-actions"><button class="btn btn-done" id="closeFS">Done</button></div>`);
    document.getElementById('closeFS').onclick = ()=>{ closeSheet(); renderAll(); };
    return;
  }
  const id = sessionQueue.shift();
  openExercise(id);
}

/* ================= EXERCISE PLAYER ================= */
let activeExercise = null;

function openExercise(id){
  const base = EXERCISES[id];
  const ex = Object.assign({}, base, {sets: effectiveSets(base), holdSeconds: base.holdSeconds ? effectiveHoldSeconds(base) : base.holdSeconds});
  activeExercise = { id, ex, demoTimer:null, restTimer:null, holdTimer:null };
  document.getElementById('exTitle').textContent = ex.name;
  document.getElementById('exercisePlayer').classList.add('active');
  requestWakeLock();
  startKeepAlive();
  resetExerciseState();
}

function resetExerciseState(){
  const ex = activeExercise.ex;
  const holdMode = !!ex.holdSeconds;
  stopDemoLoop();
  if(activeExercise.restTimer) clearInterval(activeExercise.restTimer);
  if(activeExercise.holdTimer) clearInterval(activeExercise.holdTimer);
  Object.assign(activeExercise, {
    setIndex: 0,
    state: holdMode ? 'hold' : 'set',
    restRemaining: ex.restSeconds,
    holdRemaining: ex.holdSeconds || 0,
    demoIdx: 0,
  });
  renderFilmstrip();
  renderExAction();
  updateFigureStage();
  startDemoLoop();
  if(holdMode){ activeExercise.holdTimer = setInterval(tickHold, 1000); }
}

document.getElementById('exRestart').onclick = ()=>{
  if(!activeExercise) return;
  openSheet(`
    <h3>Restart this exercise?</h3>
    <p class="hint">Jump back to Set 1. Nothing gets logged until you finish.</p>
    <div class="sheet-actions"><button class="btn btn-primary" id="csExRestartYes">Restart</button><button class="btn btn-ghost" id="csExRestartNo">Cancel</button></div>
  `);
  document.getElementById('csExRestartNo').onclick = closeSheet;
  document.getElementById('csExRestartYes').onclick = ()=>{ closeSheet(); resetExerciseState(); };
};

function renderFilmstrip(){
  const ex = activeExercise.ex;
  document.getElementById('exFilmstrip').innerHTML = ex.sequence.map((poseKey,i)=>
    `<div class="filmstrip-item ${i===0?'current':''}" data-idx="${i}">
      ${ex.poses[poseKey]}
      <div class="fs-label">${ex.labels[i]}</div>
    </div>`).join('');
}

function updateFigureStage(){
  const ex = activeExercise.ex;
  const poseKey = ex.sequence[activeExercise.demoIdx];
  document.getElementById('exFigureStage').innerHTML = ex.poses[poseKey];
  document.querySelectorAll('#exFilmstrip .filmstrip-item').forEach((el,i)=>{
    el.classList.toggle('current', i===activeExercise.demoIdx);
  });
}

function startDemoLoop(){
  stopDemoLoop();
  activeExercise.demoTimer = setInterval(()=>{
    const len = activeExercise.ex.sequence.length;
    activeExercise.demoIdx = (activeExercise.demoIdx+1) % len;
    updateFigureStage();
  }, 1100);
}
function stopDemoLoop(){ if(activeExercise && activeExercise.demoTimer) clearInterval(activeExercise.demoTimer); }

function tickHold(){
  activeExercise.holdRemaining--;
  if(activeExercise.holdRemaining <= 3 && activeExercise.holdRemaining > 0) beep('tick');
  if(activeExercise.holdRemaining <= 0){
    clearInterval(activeExercise.holdTimer);
    const isLast = activeExercise.setIndex+1 >= activeExercise.ex.sets;
    beep(isLast ? 'done' : 'chime');
    completeSet();
    return;
  }
  const t = document.getElementById('exHoldTime');
  if(t) t.textContent = fmtClock(activeExercise.holdRemaining);
}

function renderExAction(){
  const {id, ex, setIndex, state, restRemaining, holdRemaining} = activeExercise;
  const action = document.getElementById('exAction');
  const w = (ex.loadType==='weight' || ex.loadType==='weight_optional') ? recommendedWeightFor(id) : null;
  const lastW = w!=null ? lastWeightFor(id) : null;
  const wLabel = (lastW!=null && w!==lastW) ? 'suggested' : 'last time';
  const loadLine = w!=null ? `<div class="load-callout">🏋️ Use <b>${w}kg</b> <span>(${wLabel})</span></div>` : '';
  if(state==='hold'){
    action.innerHTML = `
      <div class="set-badge">Set ${setIndex+1} of ${ex.sets}</div>
      <div class="set-target">Hold — form over duration</div>
      <div class="player-time mono" id="exHoldTime">${fmtClock(holdRemaining)}</div>
      <div class="ex-cues segment-list">
        ${ex.cues.map(c=>`<div class="seg-row"><div class="seg-dot" style="background:var(--easy)"></div><div class="seg-label">${c}</div></div>`).join('')}
      </div>`;
  } else if(state==='set'){
    action.innerHTML = `
      <div class="set-badge">Set ${setIndex+1} of ${ex.sets}</div>
      <div class="set-target">Target ${ex.reps} reps · form over speed</div>
      ${loadLine}
      <button class="btn btn-primary" id="exDoneBtn">Done with set →</button>
      <div class="ex-cues segment-list">
        ${ex.cues.map(c=>`<div class="seg-row"><div class="seg-dot" style="background:var(--easy)"></div><div class="seg-label">${c}</div></div>`).join('')}
      </div>`;
    document.getElementById('exDoneBtn').onclick = completeSet;
  } else {
    action.innerHTML = `
      <div class="rest-label">Rest before Set ${setIndex+1}</div>
      <div class="player-time mono" id="exRestTime">${fmtClock(restRemaining)}</div>
      ${loadLine}
      <div class="ctrl-btn" id="exSkipRest" style="margin-top:22px; max-width:220px;">Skip rest</div>`;
    document.getElementById('exSkipRest').onclick = ()=>{ activeExercise.restRemaining = 0; tickRest(); };
  }
}

function completeSet(){
  activeExercise.setIndex++;
  if(activeExercise.setIndex >= activeExercise.ex.sets){ finishExercise(); return; }
  activeExercise.state = 'rest';
  activeExercise.restRemaining = activeExercise.ex.restSeconds;
  stopDemoLoop();
  renderExAction();
  activeExercise.restTimer = setInterval(tickRest, 1000);
}

function tickRest(){
  activeExercise.restRemaining--;
  if(activeExercise.restRemaining <= 3 && activeExercise.restRemaining > 0) beep('tick');
  if(activeExercise.restRemaining <= 0){
    clearInterval(activeExercise.restTimer);
    beep('chime');
    const holdMode = !!activeExercise.ex.holdSeconds;
    activeExercise.state = holdMode ? 'hold' : 'set';
    if(holdMode) activeExercise.holdRemaining = activeExercise.ex.holdSeconds;
    renderExAction();
    startDemoLoop();
    if(holdMode) activeExercise.holdTimer = setInterval(tickHold, 1000);
    return;
  }
  const t = document.getElementById('exRestTime');
  if(t) t.textContent = fmtClock(activeExercise.restRemaining);
}

function confirmSheet(message, onYes){
  openSheet(`
    <h3>Are you sure?</h3>
    <p class="hint">${message}</p>
    <div class="sheet-actions"><button class="btn btn-outline-danger" id="csYes">Yes, exit</button><button class="btn btn-ghost" id="csNo">Keep going</button></div>
  `);
  document.getElementById('csYes').onclick = ()=>{ closeSheet(); onYes(); };
  document.getElementById('csNo').onclick = ()=>{ closeSheet(); };
}

document.getElementById('exClose').onclick = ()=>{
  if(!activeExercise) return;
  stopDemoLoop();
  if(activeExercise.restTimer) clearInterval(activeExercise.restTimer);
  if(activeExercise.holdTimer) clearInterval(activeExercise.holdTimer);
  openSheet(`
    <h3>Exit exercise?</h3>
    <p class="hint">Progress on this exercise will not be saved.${sessionQueue!==null && sessionQueue.length>0 ? ' The rest of today\u2019s session will stop too.' : ''}</p>
    <div class="sheet-actions"><button class="btn btn-outline-danger" id="csYes">Yes, exit</button><button class="btn btn-ghost" id="csNo">Keep going</button></div>
  `);
  document.getElementById('csYes').onclick = ()=>{
    closeSheet();
    document.getElementById('exercisePlayer').classList.remove('active');
    releaseWakeLock();
    stopKeepAlive();
    activeExercise = null;
    sessionQueue = null;
  };
  document.getElementById('csNo').onclick = ()=>{
    closeSheet();
    if(!activeExercise) return;
    if(activeExercise.state==='rest') activeExercise.restTimer = setInterval(tickRest,1000);
    else { startDemoLoop(); if(activeExercise.state==='hold') activeExercise.holdTimer = setInterval(tickHold,1000); }
  };
};

async function saveStrengthLog(entry){
  strengthLog.push(entry);
  strengthDatesSet.add(iso(new Date(entry.completedAt)));
  await storageSet('strengthLog', strengthLog);
}

function finishExercise(){
  stopDemoLoop();
  releaseWakeLock();
  stopKeepAlive();
  const {id, ex} = activeExercise;
  document.getElementById('exercisePlayer').classList.remove('active');
  activeExercise = null;
  const isWeight = ex.loadType==='weight' || ex.loadType==='weight_optional';
  const prefillWeight = recommendedWeightFor(id);
  const weightFieldHTML = isWeight ? `
    <div class="field"><label>Weight used (kg)${ex.loadType==='weight_optional'?' — optional':''}</label>
      <input type="number" id="exFinWeight" inputmode="decimal" step="0.5" placeholder="e.g. 10" value="${prefillWeight!=null?prefillWeight:''}"></div>` : '';
  openSheet(`
    <h3>${ex.name} done 💪</h3>
    <p class="hint">${ex.sets} sets complete — nice work.</p>
    ${weightFieldHTML}
    <div class="field"><label>How did it feel? (RPE 1–10)</label><div class="rpe-row" id="exFinRpe"></div></div>
    <div class="field"><label>Notes (optional)</label><textarea id="exFinNotes" placeholder="Form notes..."></textarea></div>
    <div class="sheet-actions"><button class="btn btn-done" id="exFinSave">Save</button></div>
  `);
  buildRpeRow('exFinRpe');
  document.getElementById('exFinSave').onclick = async ()=>{
    const rpe = document.querySelector('#exFinRpe .rpe-pill.sel');
    const notes = document.getElementById('exFinNotes').value;
    const weightInput = document.getElementById('exFinWeight');
    const weight = weightInput && weightInput.value ? Number(weightInput.value) : null;
    const rpeVal = rpe ? Number(rpe.dataset.v) : null;
    await saveStrengthLog({exerciseId:id, sets:ex.sets, completedAt:Date.now(), rpe: rpeVal, weight, notes: notes||null});
    closeSheet();
    renderAll();
    if(sessionQueue!==null){
      // Guided session: keep momentum, skip per-exercise suggestion popups.
      openNextInQueue();
      return;
    }
    const loadShown = await maybeSuggestLoadChange(id, weight, rpeVal);
    if(!loadShown) await maybeSuggestScaleBack(id);
  };
}

/* ================= LOAD / HOLD-TIME PROGRESSION (RPE autoregulation) ================= */
// Standard autoregulation heuristic: RPE 1-4 = too easy → nudge up ~5-10%.
// RPE 5-7 = right in the zone → hold. RPE 8-10 = too hard → ease back ~10% to protect form.
async function maybeSuggestLoadChange(exerciseId, weight, rpe){
  if(rpe==null) return false;
  const base = EXERCISES[exerciseId];
  if(base.loadType==='hold'){
    const current = effectiveHoldSeconds(base);
    let next = current, note = '';
    if(rpe<=4){ next = Math.round((current*1.1)/5)*5; note = 'that felt light — try holding a bit longer next time'; }
    else if(rpe>=8){ next = Math.max(15, Math.round((current*0.9)/5)*5); note = 'that felt very hard — ease off a little to protect your form'; }
    if(next===current) return false;
    openSheet(`
      <h3>Adjust the hold?</h3>
      <p class="hint">${base.name} — ${note}. Move from ${current}s to ${next}s?</p>
      <div class="sheet-actions"><button class="btn btn-primary" id="loadYes">Update to ${next}s</button><button class="btn btn-ghost" id="loadNo">Keep ${current}s</button></div>
    `);
    document.getElementById('loadNo').onclick = closeSheet;
    document.getElementById('loadYes').onclick = async ()=>{
      settings.exerciseOverrides[exerciseId] = Object.assign({}, settings.exerciseOverrides[exerciseId], {holdSeconds: next});
      await saveSettings(); closeSheet(); renderAll();
    };
    return true;
  }
  if((base.loadType==='weight' || base.loadType==='weight_optional') && weight!=null && weight>0){
    let next = weight, note = '';
    if(rpe<=4){ next = Math.round((weight*1.075)*2)/2; note = 'that felt light — try a bit more next time'; }
    else if(rpe>=8){ next = Math.max(1, Math.round((weight*0.9)*2)/2); note = 'that felt very hard — ease back slightly to protect form'; }
    if(next===weight) return false;
    openSheet(`
      <h3>Adjust the load?</h3>
      <p class="hint">${base.name} — ${note}. Move from ${weight}kg to ${next}kg?</p>
      <div class="sheet-actions"><button class="btn btn-primary" id="loadYes">Update to ${next}kg</button><button class="btn btn-ghost" id="loadNo">Keep ${weight}kg</button></div>
    `);
    document.getElementById('loadNo').onclick = async ()=>{
      settings.exerciseOverrides[exerciseId] = Object.assign({}, settings.exerciseOverrides[exerciseId], {recommendedWeight: weight});
      await saveSettings(); closeSheet();
    };
    document.getElementById('loadYes').onclick = async ()=>{
      settings.exerciseOverrides[exerciseId] = Object.assign({}, settings.exerciseOverrides[exerciseId], {recommendedWeight: next});
      await saveSettings(); closeSheet(); renderAll();
    };
    return true;
  }
  return false;
}

/* ================= ADAPTIVE INTENSITY: low-RPE streak suggestion ================= */
async function maybeSuggestScaleBack(exerciseId){
  const entries = strengthLog.filter(e=>e.exerciseId===exerciseId).sort((a,b)=>b.completedAt-a.completedAt);
  const last3 = entries.slice(0,3);
  if(last3.length < 3) return;
  const allLow = last3.every(e=>e.rpe!=null && Number(e.rpe) < 3);
  if(!allLow) return;
  const marker = last3[0].completedAt;
  const ov = settings.exerciseOverrides[exerciseId];
  if(ov && ov.suggestedFor === marker) return; // already asked about this exact streak
  const base = EXERCISES[exerciseId];
  const current = effectiveSets(base);
  if(current <= 2) return; // already at the floor
  openSheet(`
    <h3>${base.name} feeling light?</h3>
    <p class="hint">You've rated this below 3/10 three sessions in a row. Want to scale it back a notch — ${current} sets → ${current-1}?</p>
    <div class="sheet-actions"><button class="btn btn-primary" id="scaleYes">Scale back</button><button class="btn btn-ghost" id="scaleNo">Keep as is</button></div>
  `);
  document.getElementById('scaleNo').onclick = async ()=>{
    settings.exerciseOverrides[exerciseId] = Object.assign({}, ov, {suggestedFor: marker});
    await saveSettings(); closeSheet();
  };
  document.getElementById('scaleYes').onclick = async ()=>{
    settings.exerciseOverrides[exerciseId] = Object.assign({}, ov, {sets: current-1, suggestedFor: marker});
    await saveSettings(); closeSheet(); renderAll();
  };
}

/* ================= NAV ================= */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    currentView = btn.dataset.view;
    document.getElementById('view-'+currentView).classList.add('active');
    if(currentView==='week') renderCalendarView();
    if(currentView==='progress') renderProgressView();
    if(currentView==='strength') renderStrengthView();
  };
});
document.getElementById('settingsBtn').onclick = openSettingsSheet;
document.getElementById('profileWrap').onclick = ()=>{
  document.querySelector('.nav-btn[data-view="progress"]').click();
};

/* ================= INIT ================= */
function renderAll(){
  renderProfile();
  renderToday();
  if(currentView==='week') renderCalendarView();
  if(currentView==='progress') renderProgressView();
}

(async function init(){
  await loadState();
  if(!settings || !settings.startDate){
    openOnboarding();
    // render a placeholder profile/today behind the sheet using today as tentative start
    settings = {startDate: todayISO(), exerciseOverrides:{}, updateUrl: DEFAULT_UPDATE_URL};
  }
  renderAll();
})();
</script>
