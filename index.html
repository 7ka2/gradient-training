/* ================= AUDIO ================= */
let actx;
function beep(freq=880, dur=0.12, vol=0.15){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(); const g = actx.createGain();
    o.frequency.value = freq; o.type='sine';
    g.gain.value = vol;
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}

/* ================= WORKOUT PLAYER ================= */
function startPlayer(typeKey, dISO){
  const type = TYPES[typeKey];
  activePlayer = {
    typeKey, dISO,
    segments: type.segments,
    idx: 0,
    remaining: type.segments[0].seconds,
    paused: false,
    timer: null,
    food: pickFood(dISO+typeKey),
    kcalBurned: 0,
  };
  document.getElementById('playerWorkoutName').textContent = type.name;
  document.getElementById('player').classList.add('active');
  document.getElementById('pedalRotor').style.animationPlayState = 'running';
  renderPlayerSegment();
  tickPlayer(true);
  activePlayer.timer = setInterval(()=>tickPlayer(false), 1000);
}

function kindStyle(kind){
  const map = {easy:{bg:'rgba(111,183,224,0.16)', c:'var(--easy)'}, hard:{bg:'rgba(242,153,74,0.18)', c:'var(--hard)'}, grind:{bg:'rgba(224,87,74,0.18)', c:'var(--grind)'}, rest:{bg:'rgba(255,255,255,0.08)', c:'var(--text-dim)'}};
  return map[kind]||map.rest;
}

function renderPlayerSegment(){
  const seg = activePlayer.segments[activePlayer.idx];
  const st = kindStyle(seg.kind);
  const tag = document.getElementById('playerKindTag');
  tag.textContent = seg.kind.toUpperCase();
  tag.style.background = st.bg; tag.style.color = st.c;
  document.getElementById('playerSegLabel').textContent = seg.label;
  document.getElementById('playerSegNote').textContent = seg.note||'';

  const rpe = parseRpe(seg.note);
  const activeIdx = tierIndexForRpe(rpe);
  document.getElementById('playerLadder').innerHTML = RPE_LADDER.map((t,i)=>
    `<div class="ladder-item ${i===activeIdx?'active':(i<activeIdx?'passed':'')}">${t.icon}</div>`).join('');
  const tier = RPE_LADDER[activeIdx];
  document.getElementById('playerPhrase').innerHTML = `<span class="lead">Still possible</span>${tier.label}`;
  document.getElementById('playerTime').classList.toggle('maxeffort', activeIdx >= RPE_LADDER.length-2);

  const next = activePlayer.segments[activePlayer.idx+1];
  const nc = document.getElementById('nextCard');
  if(next){
    const nTier = RPE_LADDER[tierIndexForRpe(parseRpe(next.note))];
    const nSt = kindStyle(next.kind);
    nc.innerHTML = `
      <div class="nc-bar" style="background:${nSt.c}"></div>
      <div class="nc-icon">${nTier.icon}</div>
      <div class="nc-body">
        <div class="nc-eyebrow" style="color:${nSt.c}">Up next</div>
        <div class="nc-name">${next.label}</div>
        <div class="nc-meta">${fmtClock(next.seconds)} · ${next.note||''}</div>
      </div>`;
  } else {
    nc.innerHTML = `
      <div class="nc-bar" style="background:var(--success)"></div>
      <div class="nc-icon">🏁</div>
      <div class="nc-body">
        <div class="nc-eyebrow" style="color:var(--success)">Up next</div>
        <div class="nc-name">That's the last one</div>
        <div class="nc-meta">Finish strong</div>
      </div>`;
  }

  const cadence = parseCadence(seg.note, seg.kind);
  document.getElementById('cadenceLabel').textContent = cadence + ' rpm';
  document.getElementById('pedalRotor').style.animationDuration = (60/cadence).toFixed(2)+'s';

  const food = activePlayer.food;
  const fill = document.getElementById('foodFill');
  fill.textContent = (food.emoji+' ').repeat(24);
  fill.style.width = '100%';
  document.getElementById('foodCaption').textContent = `${food.emoji} Burning off ${food.name.toLowerCase()}`;
  document.getElementById('playerDots').innerHTML = activePlayer.segments.map((s,i)=>
    `<div class="p-dot ${i<activePlayer.idx?'filled':''} ${i===activePlayer.idx?'now':''}"></div>`).join('');
}

function tickPlayer(isInit){
  if(!activePlayer) return;
  if(!isInit){
    if(activePlayer.paused) return;
    activePlayer.remaining--;
  }
  if(activePlayer.remaining <= 0){
    // move to next segment
    if(activePlayer.remaining < 0 || !isInit){
      beep(660,0.15);
      activePlayer.idx++;
      if(activePlayer.idx >= activePlayer.segments.length){
        finishPlayer(); return;
      }
      activePlayer.remaining = activePlayer.segments[activePlayer.idx].seconds;
      renderPlayerSegment();
    }
  } else if(activePlayer.remaining <= 3 && !isInit){
    beep(880,0.08,0.1);
  }
  document.getElementById('playerTime').textContent = fmtClock(Math.max(activePlayer.remaining,0));

  // shrink the food bar to match time left in this segment
  const seg = activePlayer.segments[activePlayer.idx];
  const frac = Math.max(0, Math.min(1, activePlayer.remaining / seg.seconds));
  document.getElementById('foodFill').style.width = (frac*100)+'%';

  if(!isInit && !activePlayer.paused){
    activePlayer.kcalBurned += (KCAL_PER_MIN[seg.kind]||6)/60;
    const burnedCount = (activePlayer.kcalBurned / activePlayer.food.kcal).toFixed(1);
    document.getElementById('foodBurned').textContent = `≈ ${burnedCount} ${activePlayer.food.name.toLowerCase()} burned so far`;
  }
}

document.getElementById('playerPause').onclick = ()=>{
  if(!activePlayer) return;
  activePlayer.paused = !activePlayer.paused;
  document.getElementById('playerPause').textContent = activePlayer.paused ? 'Resume' : 'Pause';
  document.getElementById('pedalRotor').style.animationPlayState = activePlayer.paused ? 'paused' : 'running';
};
document.getElementById('playerRestart').onclick = ()=>{
  if(!activePlayer) return;
  openSheet(`
    <h3>Restart this session?</h3>
    <p class="hint">Jump back to the very first segment. Nothing gets logged until you finish.</p>
    <div class="sheet-actions"><button class="btn btn-primary" id="csRestartYes">Restart</button><button class="btn btn-ghost" id="csRestartNo">Cancel</button></div>
  `);
  document.getElementById('csRestartNo').onclick = closeSheet;
  document.getElementById('csRestartYes').onclick = ()=>{
    closeSheet();
    activePlayer.idx = 0;
    activePlayer.remaining = activePlayer.segments[0].seconds;
    activePlayer.paused = false;
    activePlayer.kcalBurned = 0;
    document.getElementById('playerPause').textContent = 'Pause';
    document.getElementById('pedalRotor').style.animationPlayState = 'running';
    renderPlayerSegment();
    tickPlayer(true);
  };
};
document.getElementById('playerSkip').onclick = ()=>{
  if(!activePlayer) return;
  activePlayer.remaining = 0;
  tickPlayer(false);
};
document.getElementById('playerClose').onclick = ()=>{
  if(!activePlayer) return;
  clearInterval(activePlayer.timer);
  openSheet(`
    <h3>Exit workout?</h3>
    <p class="hint">Progress on this session will not be saved.</p>
    <div class="sheet-actions"><button class="btn btn-outline-danger" id="csYes">Yes, exit</button><button class="btn btn-ghost" id="csNo">Keep going</button></div>
  `);
  document.getElementById('csYes').onclick = ()=>{
    closeSheet();
    document.getElementById('player').classList.remove('active');
    document.getElementById('pedalRotor').style.animationPlayState='paused';
    activePlayer = null;
  };
  document.getElementById('csNo').onclick = ()=>{
    closeSheet();
    if(!activePlayer) return;
    activePlayer.timer = setInterval(()=>tickPlayer(false), 1000);
  };
};

function finishPlayer(){
  clearInterval(activePlayer.timer);
  document.getElementById('pedalRotor').style.animationPlayState='paused';
  const {typeKey, dISO} = activePlayer;
  document.getElementById('player').classList.remove('active');
  activePlayer = null;
  openSheet(`
    <h3>Session complete 🎉</h3>
    <p class="hint">${TYPES[typeKey].name} — nice work.</p>
    <div class="field"><label>How did it feel? (RPE 1–10)</label><div class="rpe-row" id="finRpe"></div></div>
    <div class="field"><label>Notes (optional)</label><textarea id="finNotes" placeholder="Anything worth remembering..."></textarea></div>
    <div class="sheet-actions"><button class="btn btn-done" id="finSave">Save</button></div>
  `);
  buildRpeRow('finRpe');
  document.getElementById('finSave').onclick = async ()=>{
    const rpe = document.querySelector('#finRpe .rpe-pill.sel');
    const notes = document.getElementById('finNotes').value;
    logs[dISO] = {typeKey, completedAt:Date.now(), rpe: rpe?rpe.dataset.v:null, notes: notes||null};
    await saveLogs(); closeSheet(); renderAll();
  };
}

/* ================= STRENGTH VIEW ================= */
function renderStrengthView(){
  document.getElementById('exerciseList').innerHTML = Object.values(EXERCISES).map(ex=>{
    const sets = effectiveSets(ex);
    const scaled = sets < ex.sets ? ' · scaled back' : '';
    let metaLine;
    if(ex.loadType==='hold'){
      const hold = effectiveHoldSeconds(ex);
      metaLine = `${sets} sets × ${hold}s hold${hold!==ex.holdSeconds? ' (adjusted)':''}`;
    } else if(ex.loadType==='weight' || ex.loadType==='weight_optional'){
      const w = recommendedWeightFor(ex.id);
      metaLine = `${sets} sets × ${ex.reps} reps${w!=null? ` · try ${w}kg` : ''}`;
    } else {
      metaLine = `${sets} sets × ${ex.reps} reps`;
    }
    return `
    <div class="ex-card" data-id="${ex.id}">
      <div class="ex-icon">${ex.icon}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">${metaLine}${scaled} · ${ex.target}</div>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('#exerciseList .ex-card').forEach(el=>{
    el.onclick = ()=>openExercise(el.dataset.id);
  });
}

/* ================= EXERCISE PLAYER (strength trial) ================= */
let activeExercise = null;

function openExercise(id){
  const base = EXERCISES[id];
  const ex = Object.assign({}, base, {sets: effectiveSets(base), holdSeconds: base.holdSeconds ? effectiveHoldSeconds(base) : base.holdSeconds});
  activeExercise = { id, ex, demoTimer:null, restTimer:null, holdTimer:null };
  document.getElementById('exTitle').textContent = ex.name;
  document.getElementById('exercisePlayer').classList.add('active');
  resetExerciseState();
}

function resetExerciseState(){
  const ex = activeExercise.ex;
  const holdMode = !!ex.holdSeconds;
  stopDemoLoop();
  if(activeExercise.restTimer) clearInterval(activeExercise.restTimer);
  if(activeExercise.holdTimer) clearInterval(activeExercise.holdTimer);
  Object.assign(activeExercise, {
    setIndex: 0,
    state: holdMode ? 'hold' : 'set',
    restRemaining: ex.restSeconds,
    holdRemaining: ex.holdSeconds || 0,
    demoIdx: 0,
  });
  renderFilmstrip();
  renderExAction();
  updateFigureStage();
  startDemoLoop();
  if(holdMode){ activeExercise.holdTimer = setInterval(tickHold, 1000); }
}

document.getElementById('exRestart').onclick = ()=>{
  if(!activeExercise) return;
  openSheet(`
    <h3>Restart this exercise?</h3>
    <p class="hint">Jump back to Set 1. Nothing gets logged until you finish.</p>
    <div class="sheet-actions"><button class="btn btn-primary" id="csExRestartYes">Restart</button><button class="btn btn-ghost" id="csExRestartNo">Cancel</button></div>
  `);
  document.getElementById('csExRestartNo').onclick = closeSheet;
  document.getElementById('csExRestartYes').onclick = ()=>{ closeSheet(); resetExerciseState(); };
};

function renderFilmstrip(){
  const ex = activeExercise.ex;
  document.getElementById('exFilmstrip').innerHTML = ex.sequence.map((poseKey,i)=>
    `<div class="filmstrip-item ${i===0?'current':''}" data-idx="${i}">
      ${ex.poses[poseKey]}
      <div class="fs-label">${ex.labels[i]}</div>
    </div>`).join('');
}

function updateFigureStage(){
  const ex = activeExercise.ex;
  const poseKey = ex.sequence[activeExercise.demoIdx];
  document.getElementById('exFigureStage').innerHTML = ex.poses[poseKey];
  document.querySelectorAll('#exFilmstrip .filmstrip-item').forEach((el,i)=>{
    el.classList.toggle('current', i===activeExercise.demoIdx);
  });
}

function startDemoLoop(){
  stopDemoLoop();
  activeExercise.demoTimer = setInterval(()=>{
    const len = activeExercise.ex.sequence.length;
    activeExercise.demoIdx = (activeExercise.demoIdx+1) % len;
    updateFigureStage();
  }, 1100);
}
function stopDemoLoop(){ if(activeExercise && activeExercise.demoTimer) clearInterval(activeExercise.demoTimer); }

function tickHold(){
  activeExercise.holdRemaining--;
  if(activeExercise.holdRemaining <= 3 && activeExercise.holdRemaining > 0) beep(880,0.08,0.1);
  if(activeExercise.holdRemaining <= 0){
    clearInterval(activeExercise.holdTimer);
    beep(660,0.15);
    completeSet();
    return;
  }
  const t = document.getElementById('exHoldTime');
  if(t) t.textContent = fmtClock(activeExercise.holdRemaining);
}

function renderExAction(){
  const {ex, setIndex, state, restRemaining, holdRemaining} = activeExercise;
  const action = document.getElementById('exAction');
  if(state==='hold'){
    action.innerHTML = `
      <div class="set-badge">Set ${setIndex+1} of ${ex.sets}</div>
      <div class="set-target">Hold — form over duration</div>
      <div class="player-time mono" id="exHoldTime">${fmtClock(holdRemaining)}</div>
      <div class="ex-cues segment-list">
        ${ex.cues.map(c=>`<div class="seg-row"><div class="seg-dot" style="background:var(--easy)"></div><div class="seg-label">${c}</div></div>`).join('')}
      </div>`;
  } else if(state==='set'){
    action.innerHTML = `
      <div class="set-badge">Set ${setIndex+1} of ${ex.sets}</div>
      <div class="set-target">Target ${ex.reps} reps · form over speed</div>
      <button class="btn btn-primary" id="exDoneBtn">Done with set →</button>
      <div class="ex-cues segment-list">
        ${ex.cues.map(c=>`<div class="seg-row"><div class="seg-dot" style="background:var(--easy)"></div><div class="seg-label">${c}</div></div>`).join('')}
      </div>`;
    document.getElementById('exDoneBtn').onclick = completeSet;
  } else {
    action.innerHTML = `
      <div class="rest-label">Rest before Set ${setIndex+1}</div>
      <div class="player-time mono" id="exRestTime">${fmtClock(restRemaining)}</div>
      <div class="ctrl-btn" id="exSkipRest" style="margin-top:22px; max-width:220px;">Skip rest</div>`;
    document.getElementById('exSkipRest').onclick = ()=>{ activeExercise.restRemaining = 0; tickRest(); };
  }
}

function completeSet(){
  activeExercise.setIndex++;
  if(activeExercise.setIndex >= activeExercise.ex.sets){ finishExercise(); return; }
  activeExercise.state = 'rest';
  activeExercise.restRemaining = activeExercise.ex.restSeconds;
  stopDemoLoop();
  renderExAction();
  activeExercise.restTimer = setInterval(tickRest, 1000);
}

function tickRest(){
  activeExercise.restRemaining--;
  if(activeExercise.restRemaining <= 3 && activeExercise.restRemaining > 0) beep(880,0.08,0.1);
  if(activeExercise.restRemaining <= 0){
    clearInterval(activeExercise.restTimer);
    beep(660,0.15);
    const holdMode = !!activeExercise.ex.holdSeconds;
    activeExercise.state = holdMode ? 'hold' : 'set';
    if(holdMode) activeExercise.holdRemaining = activeExercise.ex.holdSeconds;
    renderExAction();
    startDemoLoop();
    if(holdMode) activeExercise.holdTimer = setInterval(tickHold, 1000);
    return;
  }
  const t = document.getElementById('exRestTime');
  if(t) t.textContent = fmtClock(activeExercise.restRemaining);
}

function confirmSheet(message, onYes){
  openSheet(`
    <h3>Are you sure?</h3>
    <p class="hint">${message}</p>
    <div class="sheet-actions"><button class="btn btn-outline-danger" id="csYes">Yes, exit</button><button class="btn btn-ghost" id="csNo">Keep going</button></div>
  `);
  document.getElementById('csYes').onclick = ()=>{ closeSheet(); onYes(); };
  document.getElementById('csNo').onclick = ()=>{ closeSheet(); };
}

document.getElementById('exClose').onclick = ()=>{
  if(!activeExercise) return;
  stopDemoLoop();
  if(activeExercise.restTimer) clearInterval(activeExercise.restTimer);
  if(activeExercise.holdTimer) clearInterval(activeExercise.holdTimer);
  openSheet(`
    <h3>Exit exercise?</h3>
    <p class="hint">Progress on this session will not be saved.</p>
    <div class="sheet-actions"><button class="btn btn-outline-danger" id="csYes">Yes, exit</button><button class="btn btn-ghost" id="csNo">Keep going</button></div>
  `);
  document.getElementById('csYes').onclick = ()=>{
    closeSheet();
    document.getElementById('exercisePlayer').classList.remove('active');
    activeExercise = null;
  };
  document.getElementById('csNo').onclick = ()=>{
    closeSheet();
    if(!activeExercise) return;
    if(activeExercise.state==='rest') activeExercise.restTimer = setInterval(tickRest,1000);
    else { startDemoLoop(); if(activeExercise.state==='hold') activeExercise.holdTimer = setInterval(tickHold,1000); }
  };
};

async function saveStrengthLog(entry){
  strengthLog.push(entry);
  strengthDatesSet.add(iso(new Date(entry.completedAt)));
  await storageSet('strengthLog', strengthLog);
}

function finishExercise(){
  stopDemoLoop();
  const {id, ex} = activeExercise;
  document.getElementById('exercisePlayer').classList.remove('active');
  activeExercise = null;
  const isWeight = ex.loadType==='weight' || ex.loadType==='weight_optional';
  const prefillWeight = recommendedWeightFor(id);
  const weightFieldHTML = isWeight ? `
    <div class="field"><label>Weight used (kg)${ex.loadType==='weight_optional'?' — optional':''}</label>
      <input type="number" id="exFinWeight" inputmode="decimal" step="0.5" placeholder="e.g. 10" value="${prefillWeight!=null?prefillWeight:''}"></div>` : '';
  openSheet(`
    <h3>${ex.name} done 💪</h3>
    <p class="hint">${ex.sets} sets complete — nice work.</p>
    ${weightFieldHTML}
    <div class="field"><label>How did it feel? (RPE 1–10)</label><div class="rpe-row" id="exFinRpe"></div></div>
    <div class="field"><label>Notes (optional)</label><textarea id="exFinNotes" placeholder="Form notes..."></textarea></div>
    <div class="sheet-actions"><button class="btn btn-done" id="exFinSave">Save</button></div>
  `);
  buildRpeRow('exFinRpe');
  document.getElementById('exFinSave').onclick = async ()=>{
    const rpe = document.querySelector('#exFinRpe .rpe-pill.sel');
    const notes = document.getElementById('exFinNotes').value;
    const weightInput = document.getElementById('exFinWeight');
    const weight = weightInput && weightInput.value ? Number(weightInput.value) : null;
    const rpeVal = rpe ? Number(rpe.dataset.v) : null;
    await saveStrengthLog({exerciseId:id, sets:ex.sets, completedAt:Date.now(), rpe: rpeVal, weight, notes: notes||null});
    closeSheet();
    renderAll();
    const loadShown = await maybeSuggestLoadChange(id, weight, rpeVal);
    if(!loadShown) await maybeSuggestScaleBack(id);
  };
}

/* ================= LOAD / HOLD-TIME PROGRESSION (RPE autoregulation) ================= */
// Standard autoregulation heuristic: RPE 1-4 = too easy → nudge up ~5-10%.
// RPE 5-7 = right in the zone → hold. RPE 8-10 = too hard → ease back ~10% to protect form.
async function maybeSuggestLoadChange(exerciseId, weight, rpe){
  if(rpe==null) return false;
  const base = EXERCISES[exerciseId];
  if(base.loadType==='hold'){
    const current = effectiveHoldSeconds(base);
    let next = current, note = '';
    if(rpe<=4){ next = Math.round((current*1.1)/5)*5; note = 'that felt light — try holding a bit longer next time'; }
    else if(rpe>=8){ next = Math.max(15, Math.round((current*0.9)/5)*5); note = 'that felt very hard — ease off a little to protect your form'; }
    if(next===current) return false;
    openSheet(`
      <h3>Adjust the hold?</h3>
      <p class="hint">${base.name} — ${note}. Move from ${current}s to ${next}s?</p>
      <div class="sheet-actions"><button class="btn btn-primary" id="loadYes">Update to ${next}s</button><button class="btn btn-ghost" id="loadNo">Keep ${current}s</button></div>
    `);
    document.getElementById('loadNo').onclick = closeSheet;
    document.getElementById('loadYes').onclick = async ()=>{
      settings.exerciseOverrides[exerciseId] = Object.assign({}, settings.exerciseOverrides[exerciseId], {holdSeconds: next});
      await saveSettings(); closeSheet(); renderAll();
    };
    return true;
  }
  if((base.loadType==='weight' || base.loadType==='weight_optional') && weight!=null && weight>0){
    let next = weight, note = '';
    if(rpe<=4){ next = Math.round((weight*1.075)*2)/2; note = 'that felt light — try a bit more next time'; }
    else if(rpe>=8){ next = Math.max(1, Math.round((weight*0.9)*2)/2); note = 'that felt very hard — ease back slightly to protect form'; }
    if(next===weight) return false;
    openSheet(`
      <h3>Adjust the load?</h3>
      <p class="hint">${base.name} — ${note}. Move from ${weight}kg to ${next}kg?</p>
      <div class="sheet-actions"><button class="btn btn-primary" id="loadYes">Update to ${next}kg</button><button class="btn btn-ghost" id="loadNo">Keep ${weight}kg</button></div>
    `);
    document.getElementById('loadNo').onclick = async ()=>{
      settings.exerciseOverrides[exerciseId] = Object.assign({}, settings.exerciseOverrides[exerciseId], {recommendedWeight: weight});
      await saveSettings(); closeSheet();
    };
    document.getElementById('loadYes').onclick = async ()=>{
      settings.exerciseOverrides[exerciseId] = Object.assign({}, settings.exerciseOverrides[exerciseId], {recommendedWeight: next});
      await saveSettings(); closeSheet(); renderAll();
    };
    return true;
  }
  return false;
}

/* ================= ADAPTIVE INTENSITY: low-RPE streak suggestion ================= */
async function maybeSuggestScaleBack(exerciseId){
  const entries = strengthLog.filter(e=>e.exerciseId===exerciseId).sort((a,b)=>b.completedAt-a.completedAt);
  const last3 = entries.slice(0,3);
  if(last3.length < 3) return;
  const allLow = last3.every(e=>e.rpe!=null && Number(e.rpe) < 3);
  if(!allLow) return;
  const marker = last3[0].completedAt;
  const ov = settings.exerciseOverrides[exerciseId];
  if(ov && ov.suggestedFor === marker) return; // already asked about this exact streak
  const base = EXERCISES[exerciseId];
  const current = effectiveSets(base);
  if(current <= 2) return; // already at the floor
  openSheet(`
    <h3>${base.name} feeling light?</h3>
    <p class="hint">You've rated this below 3/10 three sessions in a row. Want to scale it back a notch — ${current} sets → ${current-1}?</p>
    <div class="sheet-actions"><button class="btn btn-primary" id="scaleYes">Scale back</button><button class="btn btn-ghost" id="scaleNo">Keep as is</button></div>
  `);
  document.getElementById('scaleNo').onclick = async ()=>{
    settings.exerciseOverrides[exerciseId] = Object.assign({}, ov, {suggestedFor: marker});
    await saveSettings(); closeSheet();
  };
  document.getElementById('scaleYes').onclick = async ()=>{
    settings.exerciseOverrides[exerciseId] = Object.assign({}, ov, {sets: current-1, suggestedFor: marker});
    await saveSettings(); closeSheet(); renderAll();
  };
}

/* ================= NAV ================= */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    currentView = btn.dataset.view;
    document.getElementById('view-'+currentView).classList.add('active');
    if(currentView==='week') renderCalendarView();
    if(currentView==='progress') renderProgressView();
    if(currentView==='strength') renderStrengthView();
  };
});
document.getElementById('settingsBtn').onclick = openSettingsSheet;
document.getElementById('profileWrap').onclick = ()=>{
  document.querySelector('.nav-btn[data-view="progress"]').click();
};

/* ================= INIT ================= */
function renderAll(){
  renderProfile();
  renderToday();
  if(currentView==='week') renderCalendarView();
  if(currentView==='progress') renderProgressView();
}

(async function init(){
  await loadState();
  if(!settings || !settings.startDate){
    openOnboarding();
    // render a placeholder profile/today behind the sheet using today as tentative start
    settings = {startDate: todayISO(), exerciseOverrides:{}, updateUrl: DEFAULT_UPDATE_URL};
  }
  renderAll();
})();
</script>
